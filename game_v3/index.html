    this.tm=null;
    this.enemies=[];this.npcs=[];
    D.show([
      d('Narrator','The library holds many secrets.'),
      d('Narrator','The group gathers to discuss their findings.'),
      d('Ispin','The Kingfisher Festival is in Vogler. Join us!'),
      d('Narrator','Vogler: the trading hub of the realm.'),
      d('Narrator','But first, they must understand the scar.'),
      d('Narrator','A blue dragon. A connection. A journey begins.'),
      d('Narrator','Next stop: Vogler.')
    ],()=>{if(G.sc&&G.sc.heroes)G.sc.heroes.forEach(h=>{if(h.on)G.heroHPs[h.customType]=h.hp;});Music.stop();Music.play('underwater');G.sc=new Lv2();G.sc.enter()});
  }

  _triggerRAbility(){
    const h=this.heroes[this.ai];if(!h||!h.on||h._rUsed)return;
    h._rUsed=true;const cx=h.x+h.w/2,cy=h.y+h.h/2;
    switch(h.customType){
      case 'minerva':
        this.enemies.forEach(e=>{if(!e.on)return;const dx=e.x+e.w/2-cx,dy=e.y+e.h/2-cy;if(Math.sqrt(dx*dx+dy*dy)<200)e.hurt(h.atkDmg*3);});
        G._rings.push({x:cx,y:cy,r:10,life:0.8,col:'#cc44cc'});G._rings.push({x:cx,y:cy,r:10,life:1.2,col:'#ff88ff'});
        FX.play('fx_cleave',cx,cy,96,false,0.06);
        G._floats.push({x:cx,y:cy-30,txt:'CLEAVE!',life:1.5,col:'#ff88ff'});break;
      case 'kote':
        for(let i=-2;i<=2;i++){const a=i*0.18,dir=h.rt?1:-1;const p=new HeroProj(cx,cy,Math.cos(a)*dir*7,Math.sin(a)*(-1+Math.abs(i)*0.3),h.atkDmg*2,h);p._col='#ff6600';this.projectiles.push(p);}
        G._floats.push({x:cx,y:cy-20,txt:'BARRAGE!',life:1.5,col:'#ff6600'});break;
      case 'nesta':
        this.heroes.forEach(hh=>{if(hh.on){hh._invis=true;hh._invisTimer=5.0;}});
        G._floats.push({x:cx,y:cy-20,txt:'PARTY INVISIBLE!',life:2.0,col:'#aaddff'});break;
      case 'elber':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.5,(dy/len)*2.5,h.atkDmg*4);p._amber=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'MEGA SHOT!',life:1.5,col:'#ffaa00'});break;}
      case 'nick':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.0,(dy/len)*2.0,h.atkDmg*5);p._skelMega=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'BONE SHOT!',life:1.5,col:'#e8e8d0'});break;}
    }
  }
  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
    else el.textContent='';
  }

  update(dt){
    if(this._healFlash>0)this._healFlash-=dt;
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    // Act 3: NPC interaction via Z/J/SPACE key
    if(this.act===3){
      if(this.npcs) this.npcs.forEach(n=>n.update(dt));
      if(I.pr('KeyZ')||I.pr('KeyJ')||I.pr('Space')){
        const h=this.heroes[this.ai];
        this.npcs.forEach(n=>{
          if(!n.tk&&!n._talked&&n.dlgs&&Math.abs(n.x-h.x)<100&&Math.abs(n.y-h.y)<60){
            n.tk=true;n._talked=true;
            D.show(n.dlgs,()=>{});
          }
        });
      }
      // Auto-progress when walking right past x=900
      if(this.heroes[this.ai].x>1800&&!this._act3done){
        this._act3done=true;
        D.show([d('Narrator','The truth becomes clearer with each step...')],()=>{this.bAct4()});
      }
      this.heroes[this.ai].update(dt,this.tm);
      this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
      P.up(dt);this.hud();
      if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
      return;
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));

    // Act 4: Guard detection (2-stage stealth)
    if(this.act===4&&this.tut){
      // Guard randomly switches between floor and upper platform
      {const pg=this.enemies.find(e=>e.customType==='castle_knight'&&e.on);
      if(pg&&pg._platformTimer!==undefined){pg._platformTimer-=dt;
        if(pg._platformTimer<=0){
          const H=18,gh=40;
          pg._platform=(pg._platform+1)%4;
          pg._platformTimer=3.5+Math.random()*4;
          // 0=floor, 1=P1(low), 2=P2(mid), 3=P3(high)
          const pY=[(H-4)*T,(H-5)*T-gh,(H-8)*T-gh,(H-11)*T-gh];
          pg.y=pY[pg._platform];pg.vy=0;}
        if(pg.x<5*32){pg.x=5*32;pg.rt=true;}
        if(pg.x>75*32){pg.x=75*32;pg.rt=false;}}}
      if(this.heroes.some(hh=>hh._invis)){
        // Party invisible — guard cannot detect
        this._stealthAlert=false;this._alertTimer=0;
        this.enemies.forEach(e=>{if(e._savedAi){e.ai=e._savedAi;e._savedAi=null;}});
      }else{
      const h=this.heroes[this.ai];
      let anyAlert=false;
      this.enemies.forEach(e=>{
        if(e.customType==='castle_knight'&&e.on){
          const dist=Math.sqrt((e.x-h.x)**2+(e.y-h.y)**2);
          const ALERT_R=180,CAUGHT_R=70;
          if(dist<CAUGHT_R&&!this.stealthFailed){
            this.stealthFailed=true;this._stealthAlert=false;this._alertTimer=0;
            D.show([d('Guard','Intruder! The heroes flee...')],()=>{this.stealthFailed=false;this.bAct4();});
          } else if(dist<ALERT_R){
            anyAlert=true;
            if(!this._prevAnyAlert){this._alertTimer=2.5;}
            this._stealthAlert=true;
            e.rt=(h.x>e.x);
            if(!e._savedAi){e._savedAi=e.ai;}
            e.ai='static';e.vx=0;
          }
        }
      });
      if(!anyAlert){
        this._stealthAlert=false;this._alertTimer=0;
        this.enemies.forEach(e=>{if(e._savedAi){e.ai=e._savedAi;e._savedAi=null;}});
      }
      this._prevAnyAlert=anyAlert;
      if(this._stealthAlert){
        this._alertTimer-=dt;
        if(this._alertTimer<=0&&!this.stealthFailed){
          this.stealthFailed=true;this._stealthAlert=false;
          D.show([d('Guard','I see you! Sound the alarm!')],()=>{this.stealthFailed=false;this.bAct4();});
        }
      }
      }
    }

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    // Projectile updates
    if(this.projectiles){this.projectiles.forEach(p=>{if(p instanceof HeroProj)p.update(dt,this.tm,this.enemies);else p.update(dt,this.tm,this.heroes);});this.projectiles=this.projectiles.filter(p=>p.on);}
    if(this.megaProjs){this.megaProjs.forEach(p=>p.update(dt,this.enemies));this.megaProjs=this.megaProjs.filter(p=>p.on);}

    P.up(dt);
    this.hud();

    // Scroll revival (R key, odd levels)
    if(I.pr('KeyR')&&G.scrollsLeft>0){
      let dead=this.heroes.find(h=>!h.on);
      if(dead){dead.on=true;dead.hp=Math.floor(dead.mhp*0.3);dead.x=this.heroes[this.ai].x;dead.y=this.heroes[this.ai].y-10;G.scrollsLeft--;G._floats.push({x:dead.x,y:dead.y-20,txt:'REVIVED!',life:2,col:'#ffdd44'});}
    }
    if(I.pr('KeyX'))this._triggerRAbility();

    // Act 1: Defeat all enemies
    if(this.act===1&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      this._act1done=true;
      D.show([d('Narrator','Victory in the exam!')],()=>{this.bAct2()});
    }

    // Act 4: Defeat all mimics AND reach x>700
    if(this.act===4&&this.tut&&this.enemies.slice(1).every(e=>!e.on)&&this.heroes[this.ai].x>1400){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#00aa44',6,0.8,3);
      this._act4done=true;
      D.show([d('Narrator','The library secrets are revealed!')],()=>{this.bAct5()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#0d2847');g.addColorStop(1,'#1a3a5a');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
    drawBgLayer(R.x,R.cam,'castle',240,18);

    if(this.tm)this.tm.draw(this.tileset);
    R.drawDecos(this.decos);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    // Platform labels (stealth)
    if(this.act===4){
      const H=18;const labels=[['P1',H-5],['P2',H-8],['P3',H-11]];
      labels.forEach(([lbl,row])=>{
        R.x.fillStyle='rgba(0,200,80,0.08)';
        R.x.fillRect(0,row*T-R.cam.y,CW,T);
        R.x.fillStyle='rgba(100,255,120,0.4)';R.x.font='10px monospace';
        R.x.fillText(lbl,8,row*T-R.cam.y+11);
      });
    }
    // Guard detection rings
    this.enemies.forEach(e=>{
      if(e.customType==='castle_knight'&&e.on){
        const sx=e.x+e.w/2-R.cam.x,sy=e.y+e.h/2-R.cam.y;
        R.x.save();
        R.x.strokeStyle=this._stealthAlert?'rgba(255,220,0,0.7)':'rgba(255,220,0,0.2)';
        R.x.lineWidth=2;R.x.beginPath();R.x.arc(sx,sy,180,0,Math.PI*2);R.x.stroke();
        R.x.strokeStyle='rgba(255,60,0,0.45)';R.x.lineWidth=1.5;
        R.x.beginPath();R.x.arc(sx,sy,70,0,Math.PI*2);R.x.stroke();
        if(this._stealthAlert&&this._alertTimer>0){
          R.x.fillStyle='rgba(0,0,0,0.5)';R.x.fillRect(sx-30,sy-95,60,8);
          R.x.fillStyle='rgba(255,200,0,0.9)';R.x.fillRect(sx-30,sy-95,60*(this._alertTimer/2.5),8);
        }
        R.x.restore();
      }
    });
    if(this.projectiles)this.projectiles.forEach(p=>p.draw());
    if(this.megaProjs)this.megaProjs.forEach(p=>p.draw(R.x,R.cam.x,R.cam.y));
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    if(this._fox)this._fox.draw(R.x,R.cam.x,R.cam.y);
    if(this._skeleton)this._skeleton.draw(R.x,R.cam.x,R.cam.y);
    {const h=this.heroes[this.ai];if(h){const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle=h._rUsed?'rgba(120,120,120,0.7)':'rgba(255,220,80,0.95)';mx.fillText(h._rUsed?'[X] used':'[X] ready',CW-90,44);mx.restore();}}
    // Heal flash
    if(this._healFlash>0){
      R.x.save();
      R.x.globalAlpha=Math.min(1,this._healFlash*2);
      R.x.fillStyle='#22ee66';R.x.font='bold 22px monospace';R.x.textAlign='center';
      R.x.shadowColor='#22ee66';R.x.shadowBlur=12;
      R.x.fillText('PARTY HEALED!',CW/2,CH/2-60);
      R.x.restore();R.x.textAlign='left';
    }
    // Scroll counter
    R.x.fillStyle='#ffdd44';R.x.font='bold 13px monospace';
    R.x.fillText('Scrolls: '+G.scrollsLeft+' [R]',CW-120,18);
    P.draw();
  }
}

// ═══ LEVEL 2 ═══
class Lv2{
  constructor(){this.act=0;this.tm=null;this.heroes=[];this.enemies=[];this.npcs=[];this.companions=[];this.ai=0;this.tileset='tiles_garden';this.exit=null;this.shk=0;this.shi=0;this.fishing=false;this.fishRound=0;this.fishCaught=0;this.fishBar=0;this.fishMarker=0;this.fishDir=1;this.tut=false;this.decos=[];this._healFlash=0;this.projectiles=[];this.megaProjs=[]}

  createHeroes(x,y){
    const heroes=[
      new Hero('Kote',x,y,'#40aa88','kote'),
      new Hero('Minerva',x+30,y,'#cc44cc','minerva'),
      new Hero('Elber',x+60,y,'#44aa44','elber'),
      new Hero('Nick',x+120,y,'#d0a066','nick'),
    ];
    heroes.forEach(h=>h.applyStats(h.customType));
    return heroes;
  }

  rebuildCompanions(){
    this.companions=[];
    for(let i=0;i<this.heroes.length;i++){
      if(i!==this.ai){this.heroes[i]._compIdx=this.companions.length;this.companions.push(new Companion(this.heroes[i]));}
    }
    // Snap all entities to nearest ground/platform surface
    if(this.tm){
      for(const h of this.heroes)h.snapGnd(this.tm);
      if(this.enemies)for(const e of this.enemies){e.snapGnd(this.tm);e._scene=this;}
      // Snap NPCs to ground (NPC.y is reference point; drawn bottom = y+10)
      if(this.npcs)for(const n of this.npcs){
        const bx=Math.floor(n.x/T);
        for(let yy=Math.floor(n.y/T);yy<this.tm.h;yy++){
          if(this.tm.sol(bx,yy)){n.y=yy*T-10;break}
        }
      }
    }
  }

  enter(){
    Music.play('underwater');
    this._fox=new Fox(100,100);
    this._skeleton=new Skeleton(100,100);
    this.bAct1();
  }

  bAct1(){

    this.heroes=this.createHeroes(40,(H-9)*T);

    this.heroes[0].ctrl=true;
    this.ai=0;

    const dm1=new Enem(800,(H-5)*T,20,24,'Darkmantle','#334',140,17,'chase','darkmantle');
    const dm2=new Enem(1000,(H-8)*T,20,24,'Darkmantle','#334',140,17,'patrol','darkmantle');
    const dm3=new Enem(1300,(H-9)*T,20,24,'Darkmantle','#334',150,20,'chase','darkmantle');
    const dm4=new Enem(1760,(H-8)*T,20,24,'Darkmantle','#442266',140,17,'static','darkmantle');
    [dm1,dm2,dm3,dm4].forEach(dm=>{
      dm._underwater=true;dm._floatOffset=Math.random()*6.28;dm._scene=this;dm._darkUsed=false;
    });

    D.show([d('Narrator','The Kingfisher Festival celebration...'),d('Narrator','Suddenly, Darkmantles emerge from the darkness!'),d('Tutorial','Defeat them!')],()=>{this.tut=true});
  }

  bAct2(){

    this.npcs=[
      new NPC(800,(H-4)*T,'Mayor','bakaris',[d('Mayor','Welcome to Vogler village!')]),

    ];

    D.show([d('Narrator','Vogler village - the festival center'),d('Mayor','Welcome, heroes! But darkness clouds our joy...'),d('Ispin','The sabotage must be revealed!')],()=>{});
  }

  bAct3(){

    this.fishing=true;
    this.fishRound=0;
    this.fishCaught=0;
    document.getElementById('hud').style.display='none';
    document.getElementById('hint').textContent='Fishing Minigame: Catch the fish!';
    D.show([d('Narrator','The Kingfisher Fishing Competition begins!'),d('Narrator','Time to prove your skills with the line.')],()=>{});
  }

  bAct4(){
    this.act=4;
    this.fishing=false;
    const W=300,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];this._darkZones=[];

    buildGardenPath(this.tm,W,H);
    this.decos=genDecos(W,H,'garden',this.act);

    this.heroes=this.createHeroes(50,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    const kapak=new Enem(1000,(H-5)*T,28,56,'Draconian Kapak','#4a6622',180,20,'boss','draconian_kapak');
    kapak._jumpTimer=2.0;
    this.enemies=[kapak,
      new Enem(1200,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'chase','draconian'),
      new Enem(1800,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'patrol','draconian'),
      new Enem(2400,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'chase','draconian'),
      new Enem(3000,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'patrol','draconian'),
      new Enem(3600,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'chase','draconian'),
      new Enem(4200,(H-4)*T,24,36,'Draconian Scout','#6a8844',120,12,'patrol','draconian'),
    ];

    this.rebuildCompanions();

    D.show([d('Narrator','Shadow on the Road...'),d('Narrator','A Draconian Kapak blocks the path!'),d('Tutorial','Defeat it!')],()=>{this.tut=true});
  }

  _triggerRAbility(){
    const h=this.heroes[this.ai];if(!h||!h.on||h._rUsed)return;
    h._rUsed=true;const cx=h.x+h.w/2,cy=h.y+h.h/2;
    switch(h.customType){
      case 'minerva':
        this.enemies.forEach(e=>{if(!e.on)return;const dx=e.x+e.w/2-cx,dy=e.y+e.h/2-cy;if(Math.sqrt(dx*dx+dy*dy)<200)e.hurt(h.atkDmg*3);});
        G._rings.push({x:cx,y:cy,r:10,life:0.8,col:'#cc44cc'});G._rings.push({x:cx,y:cy,r:10,life:1.2,col:'#ff88ff'});
        FX.play('fx_cleave',cx,cy,96,false,0.06);
        G._floats.push({x:cx,y:cy-30,txt:'CLEAVE!',life:1.5,col:'#ff88ff'});break;
      case 'kote':
        for(let i=-2;i<=2;i++){const a=i*0.18,dir=h.rt?1:-1;const p=new HeroProj(cx,cy,Math.cos(a)*dir*7,Math.sin(a)*(-1+Math.abs(i)*0.3),h.atkDmg*2,h);p._col='#ff6600';this.projectiles.push(p);}
        G._floats.push({x:cx,y:cy-20,txt:'BARRAGE!',life:1.5,col:'#ff6600'});break;
      case 'nesta':
        this.heroes.forEach(hh=>{if(hh.on){hh._invis=true;hh._invisTimer=5.0;}});
        G._floats.push({x:cx,y:cy-20,txt:'PARTY INVISIBLE!',life:2.0,col:'#aaddff'});break;
      case 'elber':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.5,(dy/len)*2.5,h.atkDmg*4);p._amber=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'MEGA SHOT!',life:1.5,col:'#ffaa00'});break;}
      case 'nick':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.0,(dy/len)*2.0,h.atkDmg*5);p._skelMega=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'BONE SHOT!',life:1.5,col:'#e8e8d0'});break;}
    }
  }
  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
  }

  update(dt){
    if(this._healFlash>0)this._healFlash-=dt;
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}

    if(this.fishing){
      this.fishMarker+=this.fishDir*2*dt;
      if(this.fishMarker>1)this.fishDir=-1;
      if(this.fishMarker<0)this.fishDir=1;
      if(I.pr('Space')){
        const sweetSpot=this.fishRound===0?0.3:this.fishRound===1?0.2:0.1;
        const inZone=Math.abs(this.fishMarker-0.5)<sweetSpot;
        if(inZone){
          this.fishCaught++;
          D.show([d('Narrator',`Fish ${this.fishCaught} Caught!`)],()=>{
            this.fishRound++;
            if(this.fishRound>=3){
              this.bAct4();
            }
          });
        }else{
          D.show([d('Narrator','Missed! Try again.')],()=>{});
        }
      }
      P.up(dt);
      return;
    }

    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    if(this.act===2){
      // NPC animation + interaction via Z/J/SPACE
      if(this.npcs) this.npcs.forEach(n=>n.update(dt));
      if(I.pr('KeyZ')||I.pr('KeyJ')||I.pr('Space')){
        const h=this.heroes[this.ai];
        this.npcs.forEach(n=>{
          if(!n.tk&&!n._talked&&n.dlgs&&Math.abs(n.x-h.x)<100&&Math.abs(n.y-h.y)<60){
            n.tk=true;n._talked=true;
            D.show(n.dlgs,()=>{});
          }
        });
      }
      // Auto-progress when hero walks past x=800 (right side of village)
      if(this.heroes[this.ai].x>1600&&!this._act2done){
        this._act2done=true;
        D.show([d('Narrator','The fishing competition is about to start!'),d('Ispin','Head to the river — it\'s time to fish!')],()=>{this.bAct3()});
      }
      this.heroes[this.ai].update(dt,this.tm);
      this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
      P.up(dt);this.hud();
      if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
      return;
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    // Underwater buoyancy for heroes
    if(this.act===1){
      const H=18;
      // Clamp heroes to water volume (ceiling T, floor (H-2)*T)
      this.heroes.forEach(h=>{
        if(h.y<T){h.y=T;h.vy=0;}
        if(h.y+h.h>(H-2)*T){h.y=(H-2)*T-h.h;h.vy=0;}
      });
      // Idle float bob for inactive companions
      this.heroes.filter(h=>!h.ctrl&&h.on).forEach(h=>{
        h.y+=Math.sin(Date.now()/700+(h._floatPhase||0))*0.25;
      });
      // Air timer (run out of air = die)
      this._timer-=dt;
      if(this._timer<=0){this.heroes.forEach(h=>{h.hp=0;h.on=false;});}
    }
    // Bubble updates
    if(this._bubbles)this._bubbles.forEach(b=>{b.y-=b.spd*dt;if(b.y<0)b.y=CH+Math.random()*80;});
    // Dark zone updates
    if(this._darkZones){this._darkZones.forEach(dz=>dz.update(dt));this._darkZones=this._darkZones.filter(dz=>dz.life>0);}

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    if(this.projectiles){this.projectiles.forEach(p=>{if(p instanceof HeroProj)p.update(dt,this.tm,this.enemies);else p.update(dt,this.tm,this.heroes);});this.projectiles=this.projectiles.filter(p=>p.on);}
    if(this.megaProjs){this.megaProjs.forEach(p=>p.update(dt,this.enemies));this.megaProjs=this.megaProjs.filter(p=>p.on);}

    P.up(dt);
    this.hud();
    if(I.pr('KeyX'))this._triggerRAbility();

    if(this.act===1&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      D.show([d('Narrator','The ambush is defeated!')],()=>{this.bAct2()});
    }

    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#00aa44',6,0.8,3);
      P.emit(this.enemies[0].x,this.enemies[0].y,20,'#00dd44',5,0.6,3);
      D.show([d('Narrator','The Draconian Kapak falls in acid!')],()=>{if(G.sc&&G.sc.heroes)G.sc.heroes.forEach(h=>{if(h.on)G.heroHPs[h.customType]=h.hp;});Music.stop();Music.play('stealth');G.sc=new Lv3();G.sc.enter()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    if(this.act===1){
      // Deep ocean background
      const g=R.x.createLinearGradient(0,0,0,CH);
      g.addColorStop(0,'#001533');g.addColorStop(0.5,'#002a55');g.addColorStop(1,'#001022');
      R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
      // Caustic light shafts
      const t=Date.now()/2000,ox=Math.floor(R.cam.x*0.12);
      for(let i=0;i<9;i++){
        const lx=((i*130-ox)%(CW+200))-100;
        const alpha=0.025+0.02*Math.sin(t*1.3+i*0.85);
        R.x.fillStyle=`rgba(60,150,255,${alpha})`;
        R.x.beginPath();R.x.moveTo(lx-12,0);R.x.lineTo(lx+12,0);R.x.lineTo(lx+55,CH);R.x.lineTo(lx-55,CH);R.x.closePath();R.x.fill();
      }
    }else{
      const g=R.x.createLinearGradient(0,0,0,CH);
      g.addColorStop(0,'#0d4a2a');g.addColorStop(1,'#1a5a3a');
      R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
      drawBgLayer(R.x,R.cam,'garden',300,18);
    }

    if(this.fishing){
      R.x.fillStyle='rgba(0,100,50,0.3)';
      for(let i=0;i<20;i++){
        const ox=Math.sin(Date.now()*0.001+i)*30;
        R.x.fillRect(CW/2+ox,Math.random()*CH,10,10);
      }
      const barW=40,barH=200;
      const barX=CW-60,barY=(CH-barH)/2;
      R.x.strokeStyle='#fff';R.x.lineWidth=2;
      R.x.strokeRect(barX,barY,barW,barH);
      R.x.fillStyle='#00aa44';
      const sw=this.fishRound===0?0.3:this.fishRound===1?0.2:0.1;const sweetStart=barY+(barH*(0.5-sw)),sweetHeight=barH*sw*2;
      R.x.fillRect(barX,sweetStart,barW,sweetHeight);
      const markerY=barY+this.fishMarker*barH;
      R.x.fillStyle='#ffff00';
      R.x.fillRect(barX-5,markerY-10,barW+10,20);
      R.x.fillStyle='#fff';
      R.x.font='bold 16px monospace';
      R.x.textAlign='center';
      R.x.fillText(`Fish: ${this.fishCaught}/3`,CW/2,50);
      R.x.fillText('Press SPACE',CW/2,CH-50);
      P.draw();
      return;
    }

    if(this.tm)this.tm.draw(this.tileset);
    if(this.act!==1)R.drawDecos(this.decos);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    if(this.projectiles)this.projectiles.forEach(p=>p.draw());
    if(this.megaProjs)this.megaProjs.forEach(p=>p.draw(R.x,R.cam.x,R.cam.y));
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    if(this._fox)this._fox.draw(R.x,R.cam.x,R.cam.y);
    if(this._skeleton)this._skeleton.draw(R.x,R.cam.x,R.cam.y);
    {const h=this.heroes[this.ai];if(h){const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle=h._rUsed?'rgba(120,120,120,0.7)':'rgba(255,220,80,0.95)';mx.fillText(h._rUsed?'[X] used':'[X] ready',CW-90,44);mx.restore();}}
    // Rising bubbles (underwater act only)
    if(this.act===1&&this._bubbles){
      const cam=R.cam.x;
      this._bubbles.forEach(b=>{
        const sx=b.x-cam;
        if(sx<-10||sx>CW+10)return;
        R.x.beginPath();R.x.arc(sx,b.y,b.r,0,Math.PI*2);
        R.x.strokeStyle='rgba(150,220,255,0.65)';R.x.lineWidth=1;R.x.stroke();
        // Highlight spot
        R.x.globalAlpha=0.4;
        R.x.fillStyle='rgba(220,240,255,0.9)';
        R.x.beginPath();R.x.arc(sx-b.r*0.3,b.y-b.r*0.35,b.r*0.35,0,Math.PI*2);R.x.fill();
        R.x.globalAlpha=1.0;
      });
    }
    // Deep water overlay
    if(this.act===1){R.x.fillStyle='rgba(0,30,110,0.22)';R.x.fillRect(0,0,CW,CH);}
    // Timer display
    if(this.act===1&&this._timer!==undefined){
      let tRemain=Math.max(0,this._timer);
      let tColor=tRemain<20?'#ff4444':tRemain<45?'#ffaa00':'#aaddff';
      R.x.fillStyle=tColor;R.x.font='bold 18px monospace';R.x.textAlign='center';
      R.x.fillText('ESCAPE: '+Math.ceil(tRemain)+'s',CW/2,28);
      R.x.textAlign='left';
    }
    // Dark zones
    if(this._darkZones){const cam=R.cam.x,camY=R.cam.y||0;this._darkZones.forEach(dz=>dz.draw(R.x,cam,camY));}
    // Heal flash
    if(this._healFlash>0){
      R.x.save();
      R.x.globalAlpha=Math.min(1,this._healFlash*2);
      R.x.fillStyle='#22ee66';R.x.font='bold 22px monospace';R.x.textAlign='center';
      R.x.shadowColor='#22ee66';R.x.shadowBlur=12;
      R.x.fillText('PARTY HEALED!',CW/2,CH/2-60);
      R.x.restore();R.x.textAlign='left';
    }
    P.draw();
  }
}

// ═══ LEVEL 3 ═══
class Lv3{
  constructor(){this.act=0;this.tm=null;this.heroes=[];this.enemies=[];this.npcs=[];this.companions=[];this.ai=0;this.tileset='tiles_library';this.exit=null;this.shk=0;this.shi=0;this.tut=false;this.stealthFailed=false;this.decos=[];this._alertTimer=0;this._stealthAlert=false;this._prevAnyAlert=false;this._healFlash=0;this.projectiles=[];this.megaProjs=[]}

  createHeroes(x,y){
    const heroes=[
      new Hero('Kote',x,y,'#40aa88','kote'),
      new Hero('Minerva',x+30,y,'#cc44cc','minerva'),
      new Hero('Elber',x+60,y,'#44aa44','elber'),
      new Hero('Nick',x+120,y,'#d0a066','nick'),
    ];
    heroes.forEach(h=>h.applyStats(h.customType));
    return heroes;
  }

  rebuildCompanions(){
    this.companions=[];
    for(let i=0;i<this.heroes.length;i++){
      if(i!==this.ai){this.heroes[i]._compIdx=this.companions.length;this.companions.push(new Companion(this.heroes[i]));}
    }
    // Snap all entities to nearest ground/platform surface
    if(this.tm){
      for(const h of this.heroes)h.snapGnd(this.tm);
      if(this.enemies)for(const e of this.enemies){e.snapGnd(this.tm);e._scene=this;}
      // Snap NPCs to ground (NPC.y is reference point; drawn bottom = y+10)
      if(this.npcs)for(const n of this.npcs){
        const bx=Math.floor(n.x/T);
        for(let yy=Math.floor(n.y/T);yy<this.tm.h;yy++){
          if(this.tm.sol(bx,yy)){n.y=yy*T-10;break}
        }
      }
    }
  }

  enter(){
    Music.play('stealth');
    this._fox=new Fox(100,100);
    this._skeleton=new Skeleton(100,100);

  bAct1(){

      new Enem(3500,(H-4)*T,24,36,'Censor Guard','#556688',120,12,'patrol','castle_soldier'),
      new Enem(3900,(H-4)*T,24,36,'Censor Guard','#556688',120,12,'chase','castle_soldier'),
      new Enem(4200,(H-4)*T,24,36,'Censor Guard','#556688',120,12,'patrol','castle_soldier'),

    D.show([d('Narrator','Inside the Library of Secrets...'),d('Narrator','A guard patrols the halls.'),d('Tutorial','Avoid detection and reach the end!'),d('Nesta','The censor patrols the middle. Use the upper path to slip through undetected.')],()=>{this.tut=true});
  }

  bAct2(){

  bAct3(){

    buildLibraryHalls(this.tm,W,H);

    this.heroes=this.createHeroes(50,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    // Cursed Sword in corridor between walls 32 and 52 (center ~x=42*T=672)
    this.enemies=[
      new Enem(1344,(H-4)*T,28,40,'Animated Sword','#9944ff',140,14,'static','animated_sword'),
      new Enem(800,(H-8)*T,24,36,'Cursed Gauntlet','#443322',140,13,'static','gauntlet'),

  _triggerRAbility(){
    const h=this.heroes[this.ai];if(!h||!h.on||h._rUsed)return;
    h._rUsed=true;const cx=h.x+h.w/2,cy=h.y+h.h/2;
    switch(h.customType){
      case 'minerva':
        this.enemies.forEach(e=>{if(!e.on)return;const dx=e.x+e.w/2-cx,dy=e.y+e.h/2-cy;if(Math.sqrt(dx*dx+dy*dy)<200)e.hurt(h.atkDmg*3);});
        G._rings.push({x:cx,y:cy,r:10,life:0.8,col:'#cc44cc'});G._rings.push({x:cx,y:cy,r:10,life:1.2,col:'#ff88ff'});
        FX.play('fx_cleave',cx,cy,96,false,0.06);
        G._floats.push({x:cx,y:cy-30,txt:'CLEAVE!',life:1.5,col:'#ff88ff'});break;
      case 'kote':
        for(let i=-2;i<=2;i++){const a=i*0.18,dir=h.rt?1:-1;const p=new HeroProj(cx,cy,Math.cos(a)*dir*7,Math.sin(a)*(-1+Math.abs(i)*0.3),h.atkDmg*2,h);p._col='#ff6600';this.projectiles.push(p);}
        G._floats.push({x:cx,y:cy-20,txt:'BARRAGE!',life:1.5,col:'#ff6600'});break;
      case 'nesta':
        this.heroes.forEach(hh=>{if(hh.on){hh._invis=true;hh._invisTimer=5.0;}});
        G._floats.push({x:cx,y:cy-20,txt:'PARTY INVISIBLE!',life:2.0,col:'#aaddff'});break;
      case 'elber':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.5,(dy/len)*2.5,h.atkDmg*4);p._amber=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'MEGA SHOT!',life:1.5,col:'#ffaa00'});break;}
      case 'nick':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.0,(dy/len)*2.0,h.atkDmg*5);p._skelMega=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'BONE SHOT!',life:1.5,col:'#e8e8d0'});break;}
    }
  }
  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
  }

  update(dt){
    if(this._healFlash>0)this._healFlash-=dt;
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    if(this.act===1){
      const guard=this.enemies[0];
      const hero=this.heroes[this.ai];
      if(guard&&guard.on){
        if(this.heroes.some(hh=>hh._invis)){
          // Party invisible — guard cannot detect
          this._stealthAlert=false;this._alertTimer=0;
          if(guard._savedAi){guard.ai=guard._savedAi;guard._savedAi=null;}
        }else{
        const dist=Math.sqrt((hero.x-guard.x)**2+(hero.y-guard.y)**2);
        const ALERT_R=180,CAUGHT_R=70;
        if(dist<CAUGHT_R&&this.tut&&!this.stealthFailed){
          this.stealthFailed=true;this._stealthAlert=false;this._alertTimer=0;
          D.show([d('Narrator','Detected! Forced to retreat...')],()=>{this.stealthFailed=false;this.bAct1();});
          return;
        } else if(dist<ALERT_R&&this.tut){
          if(!this._prevAnyAlert){this._alertTimer=2.5;}
          this._stealthAlert=true;
          guard.rt=(hero.x>guard.x);
          if(!guard._savedAi){guard._savedAi=guard.ai;}
          guard.ai='static';guard.vx=0;
        } else {
          this._stealthAlert=false;this._alertTimer=0;
          if(guard._savedAi){guard.ai=guard._savedAi;guard._savedAi=null;}
        }
        this._prevAnyAlert=(dist<ALERT_R&&this.tut);
        if(this._stealthAlert){
          this._alertTimer-=dt;
          if(this._alertTimer<=0&&!this.stealthFailed&&this.tut){
            this.stealthFailed=true;this._stealthAlert=false;
            D.show([d('Narrator','The guard noticed you! Fall back!')],()=>{this.stealthFailed=false;this.bAct1();});
            return;
          }
        }
        }
      }
      if(hero.x>2000&&this.tut&&!this._stealthDone){
        this._stealthDone=true;
        D.show([d('Narrator','Stealth successful!')],()=>{this.bAct2()});
        return;
      }
    }

    if(this.act===2&&!this._act2done){
      if(this.heroes[this.ai].y<100){
        this._act2done=true;
        D.show([d('Narrator','You have descended to the forbidden chamber.')],()=>{this.bAct3()});
        return;
      }
    }

    // Act 5: NPC interaction via Z/J/SPACE key
    if(this.act===5){
      if(I.pr('KeyZ')||I.pr('KeyJ')||I.pr('Space')){
        const h=this.heroes[this.ai];
        this.npcs.forEach(n=>{
          if(!n.tk&&!n._talked&&n.dlgs&&Math.abs(n.x-h.x)<100&&Math.abs(n.y-h.y)<60){
            n.tk=true;n._talked=true;
            D.show(n.dlgs,()=>{});
          }
        });
      }
    }

    if(this.act===5&&!this._act5done){
      if(this.heroes[this.ai].x>3000){
        this._act5done=true;
        D.show([d('Narrator','You escaped the library!')],()=>{if(G.sc&&G.sc.heroes)G.sc.heroes.forEach(h=>{if(h.on)G.heroHPs[h.customType]=h.hp;});Music.stop();Music.play('library');G.sc=new Lv4();G.sc.enter()});
        return;
      }
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    this.npcs.forEach(n=>n.update(dt,this.heroes[this.ai]));

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    if(this.projectiles){this.projectiles.forEach(p=>{if(p instanceof HeroProj)p.update(dt,this.tm,this.enemies);else p.update(dt,this.tm,this.heroes);});this.projectiles=this.projectiles.filter(p=>p.on);}
    if(this.megaProjs){this.megaProjs.forEach(p=>p.update(dt,this.enemies));this.megaProjs=this.megaProjs.filter(p=>p.on);}

    P.up(dt);
    this.hud();

    // Scroll revival (R key, odd levels)
    if(I.pr('KeyR')&&G.scrollsLeft>0){
      let dead=this.heroes.find(h=>!h.on);
      if(dead){dead.on=true;dead.hp=Math.floor(dead.mhp*0.3);dead.x=this.heroes[this.ai].x;dead.y=this.heroes[this.ai].y-10;G.scrollsLeft--;G._floats.push({x:dead.x,y:dead.y-20,txt:'REVIVED!',life:2,col:'#ffdd44'});}
    }
    if(I.pr('KeyX'))this._triggerRAbility();

    if(this.act===3&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#9944ff',6,0.8,3);
      D.show([d('Narrator','The curse breaks!')],()=>{this.bAct4()});
    }

    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      D.show([d('Narrator','The Spectator falls!')],()=>{this.bAct5()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#050510');g.addColorStop(1,'#080818');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
    drawBgLayer(R.x,R.cam,'library',240,20);

    if(this.tm)this.tm.draw(this.tileset);
    R.drawDecos(this.decos);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    // Safe corridor hint (stealth)
    if(this.act===1){
      const camY=R.cam.y;
      R.x.fillStyle='rgba(0,200,80,0.10)';
      R.x.fillRect(0, (20-15)*T - camY, CW, T*2);
      let pulse2 = 0.5+0.5*Math.sin(Date.now()/400);
      R.x.fillStyle=`rgba(0,220,80,${pulse2})`;
      R.x.font='16px monospace';
      R.x.fillText('→ UPPER PATH →', 40, (20-15)*T - camY + T + 8);
    }
    // Guard detection rings (stealth)
    if(this.act===1){
      this.enemies.forEach(e=>{
        if(e.customType==='lib_censor'&&e.on){
          const sx=e.x+e.w/2-R.cam.x,sy=e.y+e.h/2-R.cam.y;
          R.x.save();
          R.x.strokeStyle=this._stealthAlert?'rgba(255,220,0,0.7)':'rgba(255,220,0,0.2)';
          R.x.lineWidth=2;R.x.beginPath();R.x.arc(sx,sy,180,0,Math.PI*2);R.x.stroke();
          R.x.strokeStyle='rgba(255,60,0,0.45)';R.x.lineWidth=1.5;
          R.x.beginPath();R.x.arc(sx,sy,70,0,Math.PI*2);R.x.stroke();
          if(this._stealthAlert&&this._alertTimer>0){
            R.x.fillStyle='rgba(0,0,0,0.5)';R.x.fillRect(sx-30,sy-95,60,8);
            R.x.fillStyle='rgba(255,200,0,0.9)';R.x.fillRect(sx-30,sy-95,60*(this._alertTimer/2.5),8);
          }
          R.x.restore();
        }
      });
    }
    if(this.projectiles)this.projectiles.forEach(p=>p.draw());
    if(this.megaProjs)this.megaProjs.forEach(p=>p.draw(R.x,R.cam.x,R.cam.y));
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    if(this._fox)this._fox.draw(R.x,R.cam.x,R.cam.y);
    if(this._skeleton)this._skeleton.draw(R.x,R.cam.x,R.cam.y);
    {const h=this.heroes[this.ai];if(h){const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle=h._rUsed?'rgba(120,120,120,0.7)':'rgba(255,220,80,0.95)';mx.fillText(h._rUsed?'[X] used':'[X] ready',CW-90,44);mx.restore();}}
    // Heal flash
    if(this._healFlash>0){
      R.x.save();
      R.x.globalAlpha=Math.min(1,this._healFlash*2);
      R.x.fillStyle='#22ee66';R.x.font='bold 22px monospace';R.x.textAlign='center';
      R.x.shadowColor='#22ee66';R.x.shadowBlur=12;
      R.x.fillText('PARTY HEALED!',CW/2,CH/2-60);
      R.x.restore();R.x.textAlign='left';
    }
    // Scroll counter
    R.x.fillStyle='#ffdd44';R.x.font='bold 13px monospace';
    R.x.fillText('Scrolls: '+G.scrollsLeft+' [R]',CW-120,18);
    P.draw();
  }
}

// ═══ LEVEL 4 ═══
class Lv4{
  constructor(){this.act=0;this.tm=null;this.heroes=[];this.enemies=[];this.npcs=[];this.companions=[];this.ai=0;this.tileset='tiles_castle';this.exit=null;this.shk=0;this.shi=0;this.decos=[];this._healFlash=0;this.projectiles=[];this.megaProjs=[]}

  createHeroes(x,y){
    const heroes=[
      new Hero('Kote',x,y,'#40aa88','kote'),
      new Hero('Minerva',x+30,y,'#cc44cc','minerva'),
      new Hero('Elber',x+60,y,'#44aa44','elber'),
      new Hero('Nesta',x+90,y,'#4488cc','nesta'),
      new Hero('Nick',x+120,y,'#d0a066','nick'),
    ];
    heroes.forEach(h=>h.applyStats(h.customType));
    return heroes;
  }

  rebuildCompanions(){
    this.companions=[];
    for(let i=0;i<this.heroes.length;i++){
      if(i!==this.ai){this.heroes[i]._compIdx=this.companions.length;this.companions.push(new Companion(this.heroes[i]));}
    }
    // Snap all entities to nearest ground/platform surface
    if(this.tm){
      for(const h of this.heroes)h.snapGnd(this.tm);
      if(this.enemies)for(const e of this.enemies){e.snapGnd(this.tm);e._scene=this;}
      // Snap NPCs to ground (NPC.y is reference point; drawn bottom = y+10)
      if(this.npcs)for(const n of this.npcs){
        const bx=Math.floor(n.x/T);
        for(let yy=Math.floor(n.y/T);yy<this.tm.h;yy++){
          if(this.tm.sol(bx,yy)){n.y=yy*T-10;break}
        }
      }
    }
  }

  enter(){
    Music.play('library');
    this._fox=new Fox(100,100);
    this._skeleton=new Skeleton(100,100);
    this.bAct1();
  }

  bAct1(){
    this.act=1;
    const W=360,H=16;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    buildMasqueradeHall(this.tm,W,H);
    this.decos=genDecos(W,H,'castle',this.act);

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.npcs=[
      new NPC(300,(H-4)*T,'Bakaris','bakaris',[d('Bakaris','The time has come.')]),
      new NPC(500,(H-4)*T,'Levna','minerva',[d('Levna','The destiny awaits us.')]),
      new NPC(700,(H-4)*T,'Clystran','elber',[d('Clystran','Our bonds are tested.')]),
      new NPC(900,(H-4)*T,'Becklin','nesta',[d('Becklin','What lies ahead?')]),
      new NPC(1100,(H-4)*T,'Cudgel','nick',[d('Cudgel','The choice is ours.')]),
      new NPC(1300,(H-4)*T,'Tem Temble','kote',[d('Tem Temble','Magic flows through us all.')]),
    ];

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hud').style.display='flex';
    document.getElementById('hint').textContent='The Yurthgreen Masquerade: Explore and talk';
    D.show([d('Narrator','The Yurthgreen Masquerade begins...'),d('Narrator','A grand celebration of heroes and legends.')],()=>{});
  }

  bAct2(){
    this.act=2;
    document.getElementById('hint').textContent='The Legacy: Minerva receives Solamnic armor';
    D.show([
      d('Narrator','The great hall grows quiet. A herald calls Minerva forward.'),
      d('Lord Regent','Minerva Amberfall. Step forward and kneel.'),
      d('Minerva','I... yes, my lord.'),
      d('Lord Regent','This armor was worn by Helena Starmantle, Knight of the Rose. She fell at Neraka.'),
      d('Lord Regent','She named no successor. The armor has waited \u2014 for the one it would choose.'),
      d('Minerva','Why me? I\'m a scholar. I study things. I don\'t...'),
      d('Lord Regent','The knights of old understood that wisdom and courage are not opposites.'),
      d('Narrator','The armor settles onto Minerva\'s shoulders with a sound like a long-held breath released.'),
      d('Narrator','Something ancient and patient has finally found its purpose.'),
    ],()=>{this.bAct3()});
  }

  bAct3(){
    this.act=3;
    document.getElementById('hint').textContent='The Masquerade: A Test of Shadows';
    D.show([
      d('Narrator','A masked figure peels away from the dancing crowd — unseen by all others.'),
      d('Lohezet','Nesta. The girl who scarred the unbeatable Bakaris.'),
      d('Nesta','Who are you?'),
      d('Lohezet','Someone who recognizes power when she sees it. And power needs direction.'),
      d('Lohezet','The Dragon Armies are moving. Your little trick won\'t be enough.'),
      d('Lohezet','I can teach you what the school won\'t. Real shadow magic.'),
      d('Nesta','At what cost?'),

  _triggerRAbility(){
    const h=this.heroes[this.ai];if(!h||!h.on||h._rUsed)return;
    h._rUsed=true;const cx=h.x+h.w/2,cy=h.y+h.h/2;
    switch(h.customType){
      case 'minerva':
        this.enemies.forEach(e=>{if(!e.on)return;const dx=e.x+e.w/2-cx,dy=e.y+e.h/2-cy;if(Math.sqrt(dx*dx+dy*dy)<200)e.hurt(h.atkDmg*3);});
        G._rings.push({x:cx,y:cy,r:10,life:0.8,col:'#cc44cc'});G._rings.push({x:cx,y:cy,r:10,life:1.2,col:'#ff88ff'});
        FX.play('fx_cleave',cx,cy,96,false,0.06);
        G._floats.push({x:cx,y:cy-30,txt:'CLEAVE!',life:1.5,col:'#ff88ff'});break;
      case 'kote':
        for(let i=-2;i<=2;i++){const a=i*0.18,dir=h.rt?1:-1;const p=new HeroProj(cx,cy,Math.cos(a)*dir*7,Math.sin(a)*(-1+Math.abs(i)*0.3),h.atkDmg*2,h);p._col='#ff6600';this.projectiles.push(p);}
        G._floats.push({x:cx,y:cy-20,txt:'BARRAGE!',life:1.5,col:'#ff6600'});break;
      case 'nesta':
        this.heroes.forEach(hh=>{if(hh.on){hh._invis=true;hh._invisTimer=5.0;}});
        G._floats.push({x:cx,y:cy-20,txt:'PARTY INVISIBLE!',life:2.0,col:'#aaddff'});break;
      case 'elber':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.5,(dy/len)*2.5,h.atkDmg*4);p._amber=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'MEGA SHOT!',life:1.5,col:'#ffaa00'});break;}
      case 'nick':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.0,(dy/len)*2.0,h.atkDmg*5);p._skelMega=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'BONE SHOT!',life:1.5,col:'#e8e8d0'});break;}

  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const el=document.getElementById('ecount');
    if(this.enemies&&this.enemies.length){const al=this.enemies.filter(e=>e.on).length;el.textContent=`Enemies: ${al}/${this.enemies.length}`;}
    else el.textContent='';
  }

  update(dt){
    if(this._healFlash>0)this._healFlash-=dt;
    if(D.on){D.up(dt);return}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
    this.npcs.forEach(n=>n.update(dt,this.heroes[this.ai]));

    if(this.enemies&&this.enemies.length){
      this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
      // Hit detection
      this.heroes.forEach(hero=>{
        const ab=hero.atkBox();if(!ab)return;
        this.enemies.forEach(e=>{
          if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)
            e.hurt(ab.dmg||hero.atkDmg);
        });
      });
    }
    if(this.projectiles){this.projectiles.forEach(p=>{if(p instanceof HeroProj)p.update(dt,this.tm,this.enemies);else p.update(dt,this.tm,this.heroes);});this.projectiles=this.projectiles.filter(p=>p.on);}
    if(this.megaProjs){this.megaProjs.forEach(p=>p.update(dt,this.enemies));this.megaProjs=this.megaProjs.filter(p=>p.on);}
    // Act 3 win condition
    if(this.act===3&&this._act3combat&&this.enemies&&this.enemies.every(e=>!e.on)){
      this._act3combat=false;
      this.shk=0.5;this.shi=4;
      P.emit(CW/2,CH/2,20,'#4466aa',5,0.6,3);
      D.show([
        d('Lohezet','Impressive. The pact is sealed.'),
        d('Nesta','What have I agreed to...?'),
      ],()=>{this.bAct4()});
    }

    P.up(dt);
    this.hud();
    if(I.pr('KeyX'))this._triggerRAbility();

    // Act 1: NPC interaction via Z/J/SPACE key
    if(this.act===1){
      if(I.pr('KeyZ')||I.pr('KeyJ')||I.pr('Space')){
        const h=this.heroes[this.ai];
        this.npcs.forEach(n=>{
          if(!n.tk&&!n._talked&&n.dlgs&&Math.abs(n.x-h.x)<100&&Math.abs(n.y-h.y)<60){
            n.tk=true;n._talked=true;
            D.show(n.dlgs,()=>{});
          }
        });
      }
    }

    if(this.act===1&&this.heroes[this.ai].x>1600&&!this._act1done){
      this._act1done=true;
      D.show([d('Narrator','Moving deeper into the masquerade...')],()=>{this.bAct2()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#0d2847');g.addColorStop(1,'#1a3a5a');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
    drawBgLayer(R.x,R.cam,'castle',360,16);

    if(this.tm)this.tm.draw(this.tileset);
    R.drawDecos(this.decos);

    this.npcs.forEach(n=>n.draw());
    if(this.enemies)this.enemies.forEach(e=>e.draw());
    if(this.projectiles)this.projectiles.forEach(p=>p.draw());
    if(this.megaProjs)this.megaProjs.forEach(p=>p.draw(R.x,R.cam.x,R.cam.y));
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    if(this._fox)this._fox.draw(R.x,R.cam.x,R.cam.y);
    if(this._skeleton)this._skeleton.draw(R.x,R.cam.x,R.cam.y);
    {const h=this.heroes[this.ai];if(h){const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle=h._rUsed?'rgba(120,120,120,0.7)':'rgba(255,220,80,0.95)';mx.fillText(h._rUsed?'[X] used':'[X] ready',CW-90,44);mx.restore();}}
    // Heal flash
    if(this._healFlash>0){
      R.x.save();
      R.x.globalAlpha=Math.min(1,this._healFlash*2);
      R.x.fillStyle='#22ee66';R.x.font='bold 22px monospace';R.x.textAlign='center';
      R.x.shadowColor='#22ee66';R.x.shadowBlur=12;
      R.x.fillText('PARTY HEALED!',CW/2,CH/2-60);
      R.x.restore();R.x.textAlign='left';
    }
    P.draw();
  }
}

    D.show([d('Narrator','A towering Ogre appears, bearing a Goblin Chief!'),d('Narrator','The final defense of the enemy forces!'),d('Tutorial','Defeat them!')],()=>{this.tut=true});
  }

  bAct7(){
    this.act=7;
    const W=300,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    buildRuinsField(this.tm,W,H);
    this.decos=genDecos(W,H,'dungeon',this.act);

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    const kansaldi=new Enem(1000,(H-5)*T,40,48,'Kansaldi','#1a0a0a',1500,33,'static','kansaldi');
    kansaldi._breathTimer=4.0;
    kansaldi._breathActive=false;
    kansaldi._breathDur=0;
    this.enemies=[kansaldi];

    this.escapeTimer=10;
    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='Sin Esperanza: The Dragon Commander!';
    D.show([d('Narrator','The ground shakes...'),d('Narrator','Kansaldi, the Dragon Commander, emerges!'),d('Kansaldi','Your struggle ends now!'),d('Narrator','This battle cannot be won. Escape!')],()=>{this.tut=true});
  }

  _triggerRAbility(){
    const h=this.heroes[this.ai];if(!h||!h.on||h._rUsed)return;
    h._rUsed=true;const cx=h.x+h.w/2,cy=h.y+h.h/2;
    switch(h.customType){
      case 'minerva':
        this.enemies.forEach(e=>{if(!e.on)return;const dx=e.x+e.w/2-cx,dy=e.y+e.h/2-cy;if(Math.sqrt(dx*dx+dy*dy)<200)e.hurt(h.atkDmg*3);});
        G._rings.push({x:cx,y:cy,r:10,life:0.8,col:'#cc44cc'});G._rings.push({x:cx,y:cy,r:10,life:1.2,col:'#ff88ff'});
        FX.play('fx_cleave',cx,cy,96,false,0.06);
        G._floats.push({x:cx,y:cy-30,txt:'CLEAVE!',life:1.5,col:'#ff88ff'});break;
      case 'kote':
        for(let i=-2;i<=2;i++){const a=i*0.18,dir=h.rt?1:-1;const p=new HeroProj(cx,cy,Math.cos(a)*dir*7,Math.sin(a)*(-1+Math.abs(i)*0.3),h.atkDmg*2,h);p._col='#ff6600';this.projectiles.push(p);}
        G._floats.push({x:cx,y:cy-20,txt:'BARRAGE!',life:1.5,col:'#ff6600'});break;
      case 'nesta':
        this.heroes.forEach(hh=>{if(hh.on){hh._invis=true;hh._invisTimer=5.0;}});
        G._floats.push({x:cx,y:cy-20,txt:'PARTY INVISIBLE!',life:2.0,col:'#aaddff'});break;
      case 'elber':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.5,(dy/len)*2.5,h.atkDmg*4);p._amber=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'MEGA SHOT!',life:1.5,col:'#ffaa00'});break;}
      case 'nick':{
        const es=this.enemies.filter(e=>e.on).sort((a,b)=>Math.abs(a.x-cx)-Math.abs(b.x-cx));
        const t=es[0]||{x:cx+(h.rt?500:-500),y:cy};
        const dx=t.x-cx,dy=(t.y||cy)-cy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const p=new MegaProj(cx,cy,(dx/len)*2.0,(dy/len)*2.0,h.atkDmg*5);p._skelMega=true;this.megaProjs.push(p);
        G._floats.push({x:cx,y:cy-20,txt:'BONE SHOT!',life:1.5,col:'#e8e8d0'});break;}
    }
  }
  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
  }

  update(dt){
    if(this._healFlash>0)this._healFlash-=dt;
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    if(this.act===1&&!this._act1done){
      if(this.heroes[this.ai].x>1000){
        this._act1done=true;
        D.show([d('Narrator','The battle of High Hill begins...'),d('Narrator','But something is wrong with the actors...')],()=>{this.bAct2()});
      }
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm,this.enemies));
    if(this._fox){let nesta=this.heroes.find(h=>h.customType==='nesta'&&h.on);this._fox.update(dt,nesta||null);}
    if(this._skeleton){let nick=this.heroes.find(h=>h.customType==='nick'&&h.on);this._skeleton.update(dt,nick||null);}
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    this.npcs.forEach(n=>n.update(dt,this.heroes[this.ai]));

    // Handle ogre-goblin mechanic for act 6
    if(this.act===6&&this.enemies.length>=2){
      const ogre=this.enemies[0];
      const goblin=this.enemies[1];
      if(ogre.on&&!this._ogreDead){
        // Goblin rides on ogre
        goblin.x=ogre.x;
        goblin.y=ogre.y-ogre.h;
        goblin.inv=999;
      }else if(!ogre.on&&!this._ogreDead){
        // Ogre dies - goblin falls and becomes vulnerable
        this._ogreDead=true;
        D.show([d('Narrator','The Goblin Chief falls!')],()=>{this.tut=true});
        goblin.ai='chase';
        goblin.inv=0;
        P.emit(ogre.x+ogre.w/2,ogre.y+ogre.h/2,20,'#44cc44',6,0.8,3);
      }
    }

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    if(this.projectiles){this.projectiles.forEach(p=>{if(p instanceof HeroProj)p.update(dt,this.tm,this.enemies);else p.update(dt,this.tm,this.heroes);});this.projectiles=this.projectiles.filter(p=>p.on);}
    if(this.megaProjs){this.megaProjs.forEach(p=>p.update(dt,this.enemies));this.megaProjs=this.megaProjs.filter(p=>p.on);}

    P.up(dt);
    this.hud();

    // Scroll revival (R key, odd levels)
    if(I.pr('KeyR')&&G.scrollsLeft>0){
      let dead=this.heroes.find(h=>!h.on);
      if(dead){dead.on=true;dead.hp=Math.floor(dead.mhp*0.3);dead.x=this.heroes[this.ai].x;dead.y=this.heroes[this.ai].y-10;G.scrollsLeft--;G._floats.push({x:dead.x,y:dead.y-20,txt:'REVIVED!',life:2,col:'#ffdd44'});}
    }
    if(I.pr('KeyX'))this._triggerRAbility();

    if(this.act===2&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      D.show([d('Narrator','The soldiers fall!')],()=>{this.bAct3()});
    }

    if(this.act===3&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#00aa44',6,0.8,3);
      D.show([d('Narrator','The draconians retreat!')],()=>{this.bAct4()});
    }

    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.8;this.shi=6;P.emit(this.enemies[0].x,this.enemies[0].y,40,'#ff8833',6,0.8,3);
      D.show([d('Narrator','The Sivak falls!')],()=>{this.bAct5()});
    }

    if(this.act===5&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.8;this.shi=6;P.emit(this.enemies[0].x,this.enemies[0].y,50,'#ff4400',7,1,4);
      D.show([d('Narrator','The Boilerdrak is vanquished!')],()=>{this.bAct6()});
    }

    if(this.act===6&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.6;this.shi=5;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,30,'#d4a574',6,0.8,3);
      D.show([d('Narrator','The last defenders fall!')],()=>{this.bAct7()});
    }

    if(this.act===7&&this.tut){
      this.escapeTimer-=dt;
      if(this.escapeTimer<=0){
        D.show([
          d('Narrator','Becklin stands in the doorway as the walls ignite around her.'),
          d('Becklin','"Don\'t look back! Run \u2014 all of you! Run and don\'t stop!"'),
          d('Kote','"Becklin \u2014 NO\u2014"'),
          d('Minerva','"We can\'t leave her, we have to\u2014"'),
          d('Arturito','"I will hold the line. This is what I was made for."'),
          d('Narrator','Arturito charges into the inferno. Kansaldi turns from the fleeing heroes.'),
          d('Narrator','The heroes run through walls of fire, through collapsing stone, through choking smoke.'),
          d('Narrator','Behind them: a roar that shakes the earth. Then silence. Then nothing.'),
          d('Narrator','They emerge into cold night air, lungs burning, eyes streaming.'),
          d('Nesta','"We lost them both."'),
          d('Nick','"We\'re alive. They made sure of that."'),
          d('Narrator','Vogler village. Dawn. The survivors count what they\'ve saved and what they\'ve lost.'),
          d('Narrator','Chronicles of Azurerune. Book One: Complete.'),
        ],()=>{Music.stop();Music.play('castle');G.sc=new Lv1();G.sc.enter()});
      }
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#2a0a0a');g.addColorStop(1,'#3a1a1a');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
    drawBgLayer(R.x,R.cam,'dungeon',300,18);

    if(this.act>=5){
      for(let i=0;i<15;i++){
        const x=Math.random()*CW;
        const y=Math.random()*CH;
        R.x.fillStyle=`rgba(255,${100+Math.random()*100},0,${Math.random()*0.2})`;
        R.x.fillRect(x,y,20+Math.random()*40,20+Math.random()*40);
      }
    }

    if(this.tm)this.tm.draw(this.tileset);
    R.drawDecos(this.decos);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    if(this.projectiles)this.projectiles.forEach(p=>p.draw());
    if(this.megaProjs)this.megaProjs.forEach(p=>p.draw(R.x,R.cam.x,R.cam.y));
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    if(this._fox)this._fox.draw(R.x,R.cam.x,R.cam.y);
    if(this._skeleton)this._skeleton.draw(R.x,R.cam.x,R.cam.y);
    {const h=this.heroes[this.ai];if(h){const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle=h._rUsed?'rgba(120,120,120,0.7)':'rgba(255,220,80,0.95)';mx.fillText(h._rUsed?'[X] used':'[X] ready',CW-90,44);mx.restore();}}
    // Heal flash
    if(this._healFlash>0){
      R.x.save();
      R.x.globalAlpha=Math.min(1,this._healFlash*2);
      R.x.fillStyle='#22ee66';R.x.font='bold 22px monospace';R.x.textAlign='center';
      R.x.shadowColor='#22ee66';R.x.shadowBlur=12;
      R.x.fillText('PARTY HEALED!',CW/2,CH/2-60);
      R.x.restore();R.x.textAlign='left';
    }
    // Scroll counter
    R.x.fillStyle='#ffdd44';R.x.font='bold 13px monospace';
    R.x.fillText('Scrolls: '+G.scrollsLeft+' [R]', CW-120, 18);
    P.draw();
  }
}

      {type:'image',key:'enemy_lib_censor_idle',path:'assets/enemies/lib_censor/idle.png'},
      {type:'image',key:'enemy_lib_censor_run',path:'assets/enemies/lib_censor/run.png'},
      {type:'image',key:'enemy_lib_director_idle',path:'assets/enemies/lib_director/idle.png'},
      {type:'image',key:'enemy_lib_director_run',path:'assets/enemies/lib_director/run.png'},
      {type:'image',key:'enemy_lib_researcher_idle',path:'assets/enemies/lib_researcher/idle.png'},
      {type:'image',key:'enemy_lib_researcher_run',path:'assets/enemies/lib_researcher/run.png'},
      {type:'image',key:'enemy_hideout_scout_idle',path:'assets/enemies/hideout_scout/idle.png'},
      {type:'image',key:'enemy_hideout_scout_run',path:'assets/enemies/hideout_scout/run.png'},
      {type:'image',key:'enemy_skeleton_idle',path:'assets/enemies/skeleton/idle.png'},
      {type:'image',key:'enemy_skeleton_run',path:'assets/enemies/skeleton/run.png'},
      // Extra decorations
      {type:'image',key:'deco_bookshelf',path:'assets/env/props/extracted/bookshelf_small.png'},
      {type:'image',key:'deco_chest',path:'assets/env/props/extracted/chest_dung.png'},
      {type:'image',key:'deco_banner_green',path:'assets/env/props/extracted/banner_green.png'},
      {type:'image',key:'deco_potion_red',path:'assets/env/props/extracted/potion_red.png'},
    ];
    Assets.load(manifest).then(()=>{
      document.getElementById('loadScr').style.display='none';
      document.getElementById('title').style.display='flex';
      document.getElementById('startBtn').onclick=()=>this.start(new Lv1());
      document.getElementById('startBtn2').onclick=()=>this.start(new Lv2());
      document.getElementById('startBtn3').onclick=()=>this.start(new Lv3());
      document.getElementById('startBtn4').onclick=()=>this.start(new Lv4());
      document.getElementById('startBtn5').onclick=()=>this.start(new Lv5());
      document.getElementById('langEN').onclick=()=>{Lang.set('en');this.updateTitleText()};
      document.getElementById('langES').onclick=()=>{Lang.set('es');this.updateTitleText()};
      document.getElementById('langIT').onclick=()=>{Lang.set('it');this.updateTitleText()};
      this.updateTitleText();
    });
  },
  start(lvl){
    Music.stop();
    if(lvl instanceof Lv1)Music.play('castle');
    else if(lvl instanceof Lv2)Music.play('underwater');
    else if(lvl instanceof Lv3)Music.play('stealth');
    else if(lvl instanceof Lv4)Music.play('library');
    else if(lvl instanceof Lv5)Music.play('boss');
    document.getElementById('title').style.display='none';
    document.getElementById('c').focus();
    D.on=false;D.idx=0;D.dlgs=[];document.getElementById('dlg').style.display='none'; // Reset dialogue state
    FX.active=[]; // Clear leftover FX
    this.sc=lvl;
    try{
      this.sc.enter();
    }catch(err){
      console.error('Level enter() error:',err);
      document.getElementById('hint').textContent='ERROR: '+err.message;
    }
    I.flush(); // clear any leftover key presses from button click
    if(!this._looping){this._looping=true;this.loop()}
  },
  title(){
    Music.stop();
    this.sc=null;
    D.on=false;D.idx=0;D.dlgs=[];
    document.getElementById('title').style.display='flex';
    document.getElementById('hud').style.display='none';
    document.getElementById('dlg').style.display='none';
    document.getElementById('hint').textContent='';
    document.getElementById('ecount').textContent='';
  },
  updateTitleText(){
    document.querySelector('#title h1').textContent=Lang.t('title');
    document.querySelector('#title h2').textContent=Lang.t('subtitle');
    document.getElementById('startBtn').textContent=Lang.t('lvl1');
    document.getElementById('startBtn2').textContent=Lang.t('lvl2');
    document.getElementById('startBtn3').textContent=Lang.t('lvl3');
    document.getElementById('startBtn4').textContent=Lang.t('lvl4');
    document.getElementById('startBtn5').textContent=Lang.t('lvl5');
    document.querySelector('#dlg .pr').textContent=Lang.t('press_space');
    // Highlight active lang
    ['EN','ES','IT'].forEach(l=>{
      const el=document.getElementById('lang'+l);
      el.style.borderColor=Lang.current===l.toLowerCase()?'#fff':'#c8a84e';
    });
  },
  _looping:false,
  loop(){
    const dt=1/60;
    Music.resume();
    if(I.pr('KeyM'))Music.toggle();
    try{
      if(this.sc){
        this.sc.update(dt);
        FX.up(dt);
        R.cls('#000');
        this.sc.draw();
        FX.draw();
        // Mute indicator
        {const mx=R.x;mx.save();mx.font='11px monospace';mx.fillStyle='rgba(255,255,255,0.55)';mx.fillText(Music.muted?'[M] MUTED':'[M] music',CW-90,14);mx.restore();}
        // Floating heal/damage numbers
        if(G._floats&&G._floats.length){
          G._floats=G._floats.filter(f=>f.life>0);
          R._floats=G._floats;
          G._floats.forEach(f=>{
            f.y-=0.7;f.life-=1/60;
            const a=Math.min(1,f.life/0.5);
            R.x.save();R.x.globalAlpha=a;
            R.x.fillStyle=f.col||'#22ee66';
            R.x.font='bold 18px monospace';
            R.x.textAlign='center';
            R.x.shadowColor=f.col||'#22ee66';R.x.shadowBlur=4;
            R.x.fillText(f.txt,f.x-R.cam.x,f.y-R.cam.y);
            R.x.restore();
          });
          R.x.textAlign='left';
        }
        // Expanding heal rings
        if(G._rings&&G._rings.length){
          G._rings=G._rings.filter(r=>r.life>0);
          G._rings.forEach(r=>{
            r.r+=4;r.life-=1/60;
            const a=Math.min(1,r.life/0.6);
            R.x.save();R.x.globalAlpha=a;
            R.x.strokeStyle=r.col;R.x.lineWidth=2;
            R.x.shadowColor=r.col;R.x.shadowBlur=8;
            R.x.beginPath();R.x.arc(r.x-R.cam.x,r.y-R.cam.y,r.r,0,Math.PI*2);R.x.stroke();
            R.x.restore();
          });
        }
      }else{
        R.cls('#0a1628');
      }
    }catch(err){
      console.error('Game loop error:',err);
      document.getElementById('hint').textContent='LOOP ERR: '+err.message;
      // Even if draw crashes, keep the loop alive so dialogue still works
      if(D.on) D.up(dt);
    }
    I.flush();
    requestAnimationFrame(()=>this.loop());
  }
};

G.init();
</script>
</body>
</html>
