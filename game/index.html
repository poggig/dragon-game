// ═══ ASSET LOADER ═══
const Assets={
  images:{},meta:{},total:0,loaded:0,
  parseMeta(txt){
    const anims={};
    for(const line of txt.split('\n')){
      const m=line.match(/^(.+?)\s*=\s*(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/);
      if(!m)continue;
      const path=m[1].trim(),x=+m[2],y=+m[3],w=+m[4],h=+m[5];
      let anim=path,frame=0;
      const fm=path.match(/^(.+?)(?:\/frame(\d+)(?:\.png)?|\.png)?$/);
      if(fm){anim=fm[1];frame=fm[2]?+fm[2]:0}
      const parts=anim.split('/');
      if(parts.length>1)anim=parts.slice(1).join('/');
      if(!anims[anim])anims[anim]=[];
      anims[anim].push({x,y,w,h,frame});
    }
    for(const k in anims)anims[k].sort((a,b)=>a.frame-b.frame);
    return anims;
  },
  async load(manifest){
    this.total=manifest.length;this.loaded=0;
    const bar=document.getElementById('loadBar'),info=document.getElementById('loadInfo');
    const bust='?v='+Date.now(); // Cache bust to force reload of updated sprites
    const promises=manifest.map(item=>{
      if(item.type==='image'){
        return new Promise(res=>{
          const img=new Image();
          img.onload=()=>{this.images[item.key]=img;this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';info.textContent=item.path;res()};
          img.onerror=()=>{console.warn('Failed:',item.path);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';res()};
          img.src=item.path+bust;
        });
      }else if(item.type==='meta'){
        return fetch(item.path+bust).then(r=>r.text()).then(txt=>{
          this.meta[item.key]=this.parseMeta(txt);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';info.textContent=item.path;
        }).catch(()=>{console.warn('Failed meta:',item.path);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%'});
      }
    });
    await Promise.all(promises);
  }
};

const I={k:{},j:{},
  init(){
    window.addEventListener('keydown',e=>{
      if(!this.k[e.code])this.j[e.code]=true;
      this.k[e.code]=true;
      if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code))e.preventDefault();
      // Direct dialogue advancement as backup — bypasses game loop entirely
      if(D.on&&(e.code==='Space'||e.code==='Enter')){
        D._advance=true;
      }
    });
    window.addEventListener('keyup',e=>{this.k[e.code]=false});
    // Click anywhere on the page advances dialogue
    window.addEventListener('click',e=>{
      if(D.on){
        D._advance=true;
        this.j['Space']=true;
      }
    });
  },
  flush(){this.j={}},down(c){return!!this.k[c]},pr(c){return!!this.j[c]}
};

// ═══ RENDERER ═══
const R={c:null,x:null,cam:{x:0,y:0},
  init(){this.c=document.getElementById('c');this.c.width=CW;this.c.height=CH;this.x=this.c.getContext('2d');this.x.imageSmoothingEnabled=false},
  cls(col){this.x.fillStyle=col;this.x.fillRect(0,0,CW,CH)},
  rect(x,y,w,h,col){this.x.fillStyle=col;this.x.fillRect(x-this.cam.x,y-this.cam.y,w,h)},
  sr(x,y,w,h,col){this.x.fillStyle=col;this.x.fillRect(x,y,w,h)},
  txt(t,x,y,c,s,a){this.x.fillStyle=c||'#fff';this.x.font=(s||11)+'px "Courier New",monospace';this.x.textAlign=a||'left';this.x.fillText(t,x,y)},
  a(v){this.x.globalAlpha=v},ra(){this.x.globalAlpha=1},

  // SPRITE-BASED HERO DRAWING (aspect-ratio preserving)
  drawHero(type,state,frame,x,y,w,h,flip){
    const cfg=SpriteConfig.heroes[type];
    if(!cfg){this._drawHeroFallback(type,state,frame,x,y,w,h,flip);return;}

    const img=Assets.images[cfg.img];
    const meta=Assets.meta[cfg.meta];
    if(!img||!meta){this._drawHeroFallback(type,state,frame,x,y,w,h,flip);return;}

    const animName=cfg.stateMap[state]||cfg.stateMap.idle;
    const frames=meta[animName];
    if(!frames||frames.length===0){this._drawHeroFallback(type,state,frame,x,y,w,h,flip);return;}

    const f=frames[frame%frames.length];
    // Preserve aspect ratio: scale sprite to fill entity height, center horizontally
    const ratio=f.w/f.h;
    const dh=h+8;const dw=dh*ratio;
    const ox=(w-dw)/2; // Center on entity
    const px=x-this.cam.x+ox,py=y-this.cam.y-4;

    const ctx=this.x;
    ctx.save();
    if(flip){
      ctx.translate(x-this.cam.x+w-ox,py);
      ctx.scale(-1,1);
      ctx.drawImage(img,f.x,f.y,f.w,f.h,0,0,dw,dh);
    }else{
      ctx.drawImage(img,f.x,f.y,f.w,f.h,px,py,dw,dh);
    }
    ctx.restore();
  },

  // SPRITE-BASED ENEMY DRAWING
  drawEnemy(type,state,frame,x,y,w,h,flip){
    const cfg=SpriteConfig.enemies[type];
    if(!cfg){this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);return;}

    const px=x-this.cam.x,py=y-this.cam.y;
    const ctx=this.x;

    if(cfg.type==='meta'){
      // Meta format (like heroes)
      const img=Assets.images[cfg.img];
      const meta=Assets.meta[cfg.meta];
      if(!img||!meta){this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);return;}

      const animName=cfg.stateMap[state]||cfg.stateMap.idle;
      const frames=meta[animName];
      if(!frames||frames.length===0){this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);return;}

      const f=frames[frame%frames.length];
      ctx.save();
      if(flip){
        ctx.translate(px+w,py);
        ctx.scale(-1,1);
        ctx.drawImage(img,f.x,f.y,f.w,f.h,0,0,w,h);
      }else{
        ctx.drawImage(img,f.x,f.y,f.w,f.h,px,py,w,h);
      }
      ctx.restore();
    }else if(cfg.type==='strip'){
      // Strip format - horizontal frames
      const stripKey=cfg.imgs[state]||cfg.imgs.idle||Object.values(cfg.imgs)[0];
      const img=Assets.images[stripKey];
      if(!img){this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);return;}

      // Derive frame size from image height (auto-detect per strip image)
      const fH=img.height;
      const fW=cfg.frameW&&cfg.frameH===img.height?cfg.frameW:fH; // Square by default, or use frameW if frameH matches
      const numFrames=Math.max(1,Math.floor(img.width/fW));
      const frameIdx=frame%numFrames;

      ctx.save();
      if(flip){
        ctx.translate(px+w,py);
        ctx.scale(-1,1);
        ctx.drawImage(img,frameIdx*fW,0,fW,fH,0,0,w,h);
      }else{
        ctx.drawImage(img,frameIdx*fW,0,fW,fH,px,py,w,h);
      }
      ctx.restore();
    }else if(cfg.type==='single'){
      // Single image - draw the full sprite
      const img=Assets.images[cfg.img];
      if(!img){this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);return;}

      ctx.save();
      if(flip){
        ctx.translate(px+w,py);
        ctx.scale(-1,1);
        ctx.drawImage(img,0,0,img.width,img.height,0,0,w,h);
      }else{
        ctx.drawImage(img,0,0,img.width,img.height,px,py,w,h);
      }
      ctx.restore();
    }else{
      this._drawEnemyFallback(type,state,frame,x,y,w,h,flip);
    }
  },

  // FALLBACK HERO DRAWING (programmatic)
  _drawHeroFallback(type,state,frame,x,y,w,h,flip){
    const ctx=this.x,px=x-this.cam.x,py=y-this.cam.y;
    const sc=(w/20);const ox=px+w/2;

    if(type==='kote'){
      // KOTE - Rogue with daggers
      ctx.fillStyle='#c8a866';ctx.fillRect(ox-3*sc,py+8*sc,6*sc,6*sc); // head
      ctx.fillStyle='#2a2a1a';ctx.fillRect(ox-2*sc,py+6*sc,4*sc,2*sc); // dark hair
      ctx.fillStyle='#3a7a55';ctx.fillRect(ox-4*sc,py+15*sc,8*sc,8*sc); // tunic
      ctx.fillStyle='#4a4a2a';ctx.fillRect(ox-5*sc,py+23*sc,10*sc,6*sc); // pants
      ctx.fillStyle='#1a1a0a';ctx.fillRect(ox-5*sc,py+29*sc,5*sc,4*sc);ctx.fillRect(ox,py+29*sc,5*sc,4*sc); // boots
      if(state==='run'){const lf=Math.sin(frame*0.5)*2;ctx.fillRect(ox-3*sc,py+29*sc,3*sc,4*sc+lf);ctx.fillRect(ox,py+29*sc,3*sc,4*sc-lf);}
      if(state==='attack'||state==='skill'){ctx.fillStyle='#aaa';const da=flip?-8:8;ctx.fillRect(ox+da*sc,py+14*sc,2*sc,8*sc);} // dagger
      if(state==='dash'){ctx.globalAlpha=0.5;ctx.fillStyle='#3a7a55';ctx.fillRect(ox-6*sc,py+15*sc,12*sc,8*sc);ctx.globalAlpha=1;}
    }
    else if(type==='minerva'){
      // MINERVA - Warrior Knight with axe
      ctx.fillStyle='#c8a866';ctx.fillRect(ox-3*sc,py+8*sc,6*sc,6*sc); // head
      ctx.fillStyle='#dd3333';ctx.fillRect(ox-2*sc,py+6*sc,4*sc,2*sc); // red hair
      ctx.fillStyle='#d4a830';ctx.fillRect(ox-5*sc,py+15*sc,10*sc,10*sc); // armor plate
      ctx.fillStyle='#aaa';ctx.fillRect(ox-6*sc,py+14*sc,2*sc,4*sc);ctx.fillRect(ox+4*sc,py+14*sc,2*sc,4*sc); // pauldrons
      ctx.fillStyle='#4a4a2a';ctx.fillRect(ox-5*sc,py+25*sc,10*sc,6*sc); // greaves
      ctx.fillStyle='#1a1a0a';ctx.fillRect(ox-5*sc,py+31*sc,5*sc,4*sc);ctx.fillRect(ox,py+31*sc,5*sc,4*sc); // boots

      if(state==='attack'||state==='skill'){ctx.fillStyle='#4f4';ctx.globalAlpha=0.7;for(let i=0;i<3;i++)ctx.fillRect(ox+(flip?-8-i*2:8+i*2)*sc,py+(16+i)*sc,1*sc,1*sc);ctx.globalAlpha=1;} // spark

      ctx.fillStyle='#4488ff';ctx.globalAlpha=0.5;for(let i=0;i<2;i++)ctx.fillRect(ox-3*sc+i*6*sc,py+(24+Math.sin(frame)*2)*sc,1*sc,3*sc);ctx.globalAlpha=1; // shadow aura
      if(state==='attack'||state==='skill'){ctx.fillStyle='#4488ff';ctx.globalAlpha=0.8;const da=flip?-8:8;ctx.fillRect(ox+da*sc,py+16*sc,2*sc,8*sc);ctx.globalAlpha=1;} // shadow bolt
    }
    else if(type==='nick'){
      // NICK - Aasimar Necromancer with halo and spectral wings
      ctx.fillStyle='#d0a066';ctx.fillRect(ox-3*sc,py+8*sc,6*sc,6*sc); // golden-bronze head

  // FALLBACK ENEMY DRAWING (programmatic)
  _drawEnemyFallback(type,state,frame,x,y,w,h,flip){
    const ctx=this.x,px=x-this.cam.x,py=y-this.cam.y;
    const sc=(w/30);const ox=px+w/2;

    if(type==='bakaris'){
      // BAKARIS - Arrogant noble with rapier
      ctx.fillStyle='#c8a866';ctx.fillRect(ox-3*sc,py+6*sc,6*sc,6*sc); // head
      ctx.fillStyle='#ffff88';ctx.fillRect(ox-2*sc,py+4*sc,4*sc,2*sc); // blond hair
      ctx.fillStyle='#dd3333';ctx.fillRect(ox-7*sc,py+13*sc,14*sc,3*sc); // red cape (sash)
      ctx.fillStyle='#8a6a4a';ctx.fillRect(ox-5*sc,py+14*sc,10*sc,10*sc); // body
      ctx.fillStyle='#1a1a0a';ctx.fillRect(ox-5*sc,py+24*sc,10*sc,5*sc); // legs
      if(state==='attack'||state==='skill'){ctx.fillStyle='#aaa';const da=flip?-8:8;ctx.fillRect(ox+da*sc,py+14*sc,1.5*sc,10*sc);} // rapier
    }
    else if(type==='student'){
      // STUDENT - Rival academy student, lighter armor, sword
      ctx.fillStyle='#c8a866';ctx.fillRect(ox-3*sc,py+6*sc,6*sc,5*sc); // head
      ctx.fillStyle='#553322';ctx.fillRect(ox-2*sc,py+4*sc,4*sc,2*sc); // brown hair
      ctx.fillStyle='#4a5a8a';ctx.fillRect(ox-5*sc,py+12*sc,10*sc,12*sc); // blue-grey uniform
      ctx.fillStyle='#c8a84e';ctx.fillRect(ox-5*sc,py+12*sc,10*sc,2*sc); // gold trim
      ctx.fillStyle='#2a2a3a';ctx.fillRect(ox-4*sc,py+24*sc,3.5*sc,6*sc);ctx.fillRect(ox+0.5*sc,py+24*sc,3.5*sc,6*sc); // legs
      ctx.fillStyle='#1a1a1a';ctx.fillRect(ox-4*sc,py+28*sc,3.5*sc,3*sc);ctx.fillRect(ox+0.5*sc,py+28*sc,3.5*sc,3*sc); // boots
      if(state==='attack'||state==='hit'){ctx.fillStyle='#888';const da=flip?-7:7;ctx.fillRect(ox+da*sc,py+14*sc,1*sc,9*sc);} // sword
    }
    else if(type==='darkmantle'){
      // DARKMANTLE - Squid-manta creature
      const px2=ox;ctx.fillStyle='#442266';ctx.beginPath();ctx.ellipse(px2,py+w/3,w/3,w/4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#88ff88';ctx.fillRect(px2-4*sc,py+w/4-2*sc,3*sc,3*sc);ctx.fillRect(px2+1*sc,py+w/4-2*sc,3*sc,3*sc);
      ctx.strokeStyle='#332244';ctx.lineWidth=1;
      for(let i=0;i<6;i++){const tx=px2-10*sc+i*3.5*sc;ctx.beginPath();ctx.moveTo(tx,py+w/3);ctx.quadraticCurveTo(tx+Math.sin(frame+i)*2*sc,py+w/3+w/4,tx,py+w);ctx.stroke();}
      // membrane flaps
      ctx.fillStyle='#6644aa';ctx.globalAlpha=0.6;ctx.beginPath();ctx.ellipse(px2-w/3.5,py+w/2.5,w/5,w/6,0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(px2+w/3.5,py+w/2.5,w/5,w/6,-0.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
    else if(type==='draconian'){
      // DRACONIAN - Reptilian humanoid
      ctx.fillStyle='#6a8844';ctx.fillRect(ox-w/4,py+w/3,w/2,w/2.5); // body
      ctx.fillStyle='#8a9a55';ctx.beginPath();ctx.ellipse(ox,py+w/6,w/3.5,w/5,0,0,Math.PI*2);ctx.fill(); // head
      ctx.fillStyle='#555';ctx.fillRect(ox-w/6,py+w/8,w/3,w/12); // mouth
      ctx.fillStyle='#333';ctx.fillRect(ox-w/5,py+w/5.5,w/6,w/8);ctx.fillRect(ox+w/15,py+w/5.5,w/6,w/8); // eyes
      // Wings
      ctx.fillStyle='#446633';ctx.globalAlpha=0.7;ctx.beginPath();ctx.ellipse(ox-w/3.5,py+w/3,w/6,w/4,-0.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(ox+w/3.5,py+w/3,w/6,w/4,0.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      // Tail
      ctx.strokeStyle='#6a8844';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ox+w/3,py+w/2);ctx.quadraticCurveTo(ox+w/2+Math.cos(frame)*3,py+w/2.5,ox+w/2,py+w);ctx.stroke();
    }
    else if(type==='spectator'){
      // SPECTATOR - Beholder-kin
      ctx.fillStyle='#dd6644';ctx.beginPath();ctx.arc(ox,py+w/2,w/2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ox+Math.sin(frame)*w/6,py+w/2,w/5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(ox+Math.sin(frame)*w/6-1,py+w/2-1,2,2);
      // Eye stalks
      ctx.strokeStyle='#dd6644';ctx.lineWidth=2;
      for(let i=0;i<4;i++){const a=Math.PI/2.5+i*Math.PI/3;ctx.beginPath();ctx.moveTo(ox,py+w/2);const ex=ox+Math.cos(a)*(w/2.2)+Math.cos(frame+i)*2;const ey=py+w/2+Math.sin(a)*(w/2.2)+Math.sin(frame+i)*2;ctx.lineTo(ex,ey);ctx.stroke();ctx.fillStyle='#88ff88';ctx.fillRect(ex-1.5,ey-1.5,3,3);}
      // Mouth
      ctx.fillStyle='#333';ctx.beginPath();ctx.ellipse(ox,py+w/1.8,w/3,w/8,0,0,Math.PI);ctx.fill();
    }
    else if(type==='mimic'){
      // MIMIC - Treasure chest
      if(state==='attack'){
        ctx.fillStyle='#8a6a2a';ctx.fillRect(ox-w/3,py+w/4,w*2/3,w/1.8); // open body
        ctx.fillStyle='#6a4a0a';ctx.fillRect(ox-w/3,py+w/4,w*2/3,w/6); // lid open
        ctx.fillStyle='#333';ctx.fillRect(ox-w/4,py+w/3.5,w/2,w/4); // dark mouth

      }else{
        ctx.fillStyle='#8a6a2a';ctx.fillRect(ox-w/3,py+w/4,w*2/3,w/1.8); // chest body
        ctx.fillStyle='#6a4a0a';ctx.fillRect(ox-w/3,py+w/4,w*2/3,w/8); // lid closed

      }
    }
    else if(type==='ogre'){
      // OGRE - Massive brute
      ctx.fillStyle='#776655';ctx.fillRect(ox-w/2.5,py+w/4,w*2/2.5,w/1.6); // huge body
      ctx.fillStyle='#666644';ctx.beginPath();ctx.ellipse(ox,py+w/8,w/2.5,w/3.5,0,0,Math.PI*2);ctx.fill(); // head
      ctx.fillStyle='#333';ctx.fillRect(ox-w/6,py+w/10,w/3,w/8); // underbite mouth

      // Arms
      ctx.fillStyle='#776655';ctx.fillRect(ox-w/2.2,py+w/3,w/4.5,w/2);ctx.fillRect(ox+w/2.2-w/4.5,py+w/3,w/4.5,w/2);
      // Legs
      ctx.fillStyle='#666644';ctx.fillRect(ox-w/3,py+w/1.8,w/4,w/2.5);ctx.fillRect(ox+w/12,py+w/1.8,w/4,w/2.5);
      // Club
      if(state==='attack'||state==='skill'){ctx.fillStyle='#6a5a3a';const da=flip?-w/2:w/2;ctx.fillRect(ox+da,py+w/4,w/6,w*0.7);ctx.fillStyle='#aaa';ctx.fillRect(ox+da+w/12,py+w/4-w/8,w/12,w/8);}
    }
    else if(type==='boilerdrak'){
      // BOILERDRAK - Mechanical dragon
      ctx.fillStyle='#888899';ctx.fillRect(ox-w/2.5,py+w/3.5,w/1.5,w/2); // segmented body
      // Head
      ctx.fillStyle='#666677';ctx.beginPath();ctx.ellipse(ox-w/2,py+w/6,w/3,w/4,0,0,Math.PI*2);ctx.fill();
      // Eyes glowing orange
      ctx.fillStyle='#ff8844';ctx.fillRect(ox-w/2.5,py+w/8,w/8,w/8);ctx.fillRect(ox-w/2.5+w/4,py+w/8,w/8,w/8);
      // Gears
      ctx.fillStyle='#555555';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(ox-w/4+i*w/4,py+w/2,w/12,0,Math.PI*2);ctx.fill();}
      // Steam vents
      ctx.fillStyle='#999';ctx.globalAlpha=0.5;ctx.fillRect(ox+w/4,py+w/5,w/8,w/8);ctx.globalAlpha=1;
      // Tail with gear
      ctx.strokeStyle='#666677';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ox+w/1.8,py+w/2);ctx.quadraticCurveTo(ox+w/1.5,py+w/2.5,ox+w/1.3,py+w);ctx.stroke();
      ctx.fillStyle='#555555';ctx.beginPath();ctx.arc(ox+w/1.3,py+w,w/10,0,Math.PI*2);ctx.fill();
    }
    else if(type==='kansaldi'){
      // KANSALDI - Red Dragon Commander
      ctx.fillStyle='#1a0a0a';ctx.fillRect(ox-w/2.2,py+w/4,w/1.1,w/1.8); // black armor
      // Flaming eyes
      ctx.fillStyle='#ff8844';ctx.fillRect(ox-w/4,py+w/6,w/6,w/6);ctx.fillRect(ox+w/8,py+w/6,w/6,w/6);
      ctx.fillStyle='#ffaa44';ctx.globalAlpha=0.7;ctx.fillRect(ox-w/4,py+w/6,w/6,w/6);ctx.fillRect(ox+w/8,py+w/6,w/6,w/6);ctx.globalAlpha=1;
      // Cape
      ctx.fillStyle='#aa2222';ctx.globalAlpha=0.8;ctx.fillRect(ox+w/1.8,py+w/3.5,w/3.5,w/1.5);ctx.globalAlpha=1;
      // Glowing pike
      if(state==='attack'||state==='skill'){ctx.fillStyle='#ff4444';const da=flip?-w/2:w/2;ctx.fillRect(ox+da,py+w/5,w/12,w*0.8);ctx.fillStyle='#ffaa44';ctx.globalAlpha=0.6;ctx.fillRect(ox+da,py+w/5,w/12,w*0.8);ctx.globalAlpha=1;}
    }
    else if(type==='goblin'){
      // GOBLIN on ground (handled by Ogre since it rides)
      ctx.fillStyle='#4a8a4a';ctx.fillRect(ox-w/4,py+w/2.5,w/2,w/2.2); // green skin
      ctx.fillStyle='#333';ctx.fillRect(ox-w/6,py+w/3,w/3,w/6); // huge eyes
      ctx.fillStyle='#ffff88';ctx.fillRect(ox-w/5.5,py+w/3.2,w/6,w/5);ctx.fillRect(ox+w/12,py+w/3.2,w/6,w/5);
      if(state==='attack'||state==='skill'){ctx.fillStyle='#aaa';const da=flip?-w/3:w/3;ctx.fillRect(ox+da,py+w/2.5,w/12,w/2);}
    }

};

// ═══ ANIMATED FX PLAYER ═══
const FX={
  active:[], // {img,fW,fH,numF,frame,timer,x,y,size,flip,speed}
  play(key,x,y,size,flip,speed){
    const img=Assets.images[key];
    if(!img)return;
    const fH=img.height;
    const fW=fH; // Square frames by default
    const numF=Math.max(1,Math.floor(img.width/fW));
    this.active.push({img,fW,fH,numF,frame:0,timer:0,x,y,size:size||fH,flip:!!flip,speed:speed||0.05});
  },
  up(dt){
    this.active=this.active.filter(f=>{
      f.timer+=dt;
      if(f.timer>=f.speed){f.timer=0;f.frame++;}
      return f.frame<f.numF;
    });
  },
  draw(){
    const ctx=R.x;
    this.active.forEach(f=>{
      const px=f.x-R.cam.x-f.size/2,py=f.y-R.cam.y-f.size/2;
      ctx.save();
      if(f.flip){
        ctx.translate(f.x-R.cam.x+f.size/2,py);
        ctx.scale(-1,1);
        ctx.drawImage(f.img,f.frame*f.fW,0,f.fW,f.fH,0,0,f.size,f.size);
      }else{
        ctx.drawImage(f.img,f.frame*f.fW,0,f.fW,f.fH,px,py,f.size,f.size);
      }
      ctx.restore();
    });
  }
};

// ═══ PARTICLES ═══
const P={ps:[],
  emit(x,y,n,col,sp,lf,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*sp;this.ps.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,l:lf,ml:lf,c:col,s:sz||2})}},
  up(dt){this.ps=this.ps.filter(p=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.08*dt*60;p.l-=dt;return p.l>0})},
  draw(){this.ps.forEach(p=>{R.a(Math.max(0,p.l/p.ml));R.rect(p.x,p.y,p.s,p.s,p.c)});R.ra()}
};

// ═══ TILEMAP ═══
class TM{
  constructor(w,h){this.w=w;this.h=h;this.d=new Uint8Array(w*h)}
  set(x,y,v){if(x>=0&&x<this.w&&y>=0&&y<this.h)this.d[y*this.w+x]=v}
  get(x,y){if(x<0||x>=this.w||y<0||y>=this.h)return 1;return this.d[y*this.w+x]}
  sol(x,y){const v=this.get(x,y);return v>=1&&v<=5}

  draw(tilesetKey){
    const timg=Assets.images[tilesetKey];
    const sx=Math.max(0,(R.cam.x/T)|0),sy=Math.max(0,(R.cam.y/T)|0);
    const ex=Math.min(this.w,sx+((CW/T)|0)+2),ey=Math.min(this.h,sy+((CH/T)|0)+2);

    for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
      const v=this.get(x,y);
      const dx=x*T-R.cam.x,dy=y*T-R.cam.y;

      if(timg){
        if(v===0){
          const tx=((x*7+y*3)%6)*T, ty=((x*3+y*7)%2)*T;
          R.x.drawImage(timg,tx,ty,T,T,dx,dy,T,T);
          R.x.fillStyle='rgba(0,0,10,0.55)';R.x.fillRect(dx,dy,T,T);
        }else if(v===1){
          const tx=((x*5+y*11)%8)*T;
          R.x.drawImage(timg,tx,0,T,T,dx,dy,T,T);
        }else if(v===2){
          const tx=((x*3+y*7)%8)*T;
          R.x.drawImage(timg,tx,T,T,T,dx,dy,T,T);
        }else if(v===3){
          const tx=((x*11+y*5)%6)*T;
          R.x.drawImage(timg,tx,T*2,T,T,dx,dy,T,T);
        }else if(v===4){
          R.x.drawImage(timg,0,T*4,T,T,dx,dy,T,T);
        }else if(v===5){
          const tx=((x*3+y)%4)*T;
          R.x.drawImage(timg,tx,T*3,T,T,dx,dy,T,T);
        }
      }else{
        const cols={0:'#1a1a2a',1:'#4a4a6a',2:'#3a3a5a',3:'#5a4a3a',4:'#c8a84e',5:'#6a4a3a'};
        R.x.fillStyle=cols[v]||'#222';R.x.fillRect(dx,dy,T,T);
      }
    }
  }
}

// ═══ ENTITY BASE ═══
class Ent{
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;this.gnd=false;this.rt=true;this.hp=100;this.mhp=100;this.on=true;this.inv=0;this.animFrame=0}
  hits(o){return this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y}

  onSolid(tm){
    const bx1=Math.floor((this.x+4)/T),bx2=Math.floor((this.x+this.w-4)/T);
    const by=Math.floor((this.y+this.h)/T);
    return tm.sol(bx1,by)||tm.sol(bx2,by);
  }
  blockedH(tm,dx){
    const nx=this.x+dx;
    const tx=dx>0?Math.floor((nx+this.w-2)/T):Math.floor((nx+2)/T);
    const ty1=Math.floor((this.y+6)/T),ty2=Math.floor((this.y+this.h-2)/T);
    return tm.sol(tx,ty1)||tm.sol(tx,ty2);
  }
  blockedUp(tm){
    const tx1=Math.floor((this.x+4)/T),tx2=Math.floor((this.x+this.w-4)/T);
    const ty=Math.floor((this.y-1)/T);
    return tm.sol(tx1,ty)||tm.sol(tx2,ty);
  }

  mv(tm){
    if(this.vx!==0){
      if(!this.blockedH(tm,this.vx))this.x+=this.vx;
      else{
        if(this.vx>0)this.x=Math.floor((this.x+this.w-2)/T)*T-(this.w-2);
        else this.x=Math.ceil((this.x+2)/T)*T-2;
        this.vx=0;
      }
    }
    if(this.vy<0){
      if(this.blockedUp(tm)){this.vy=0;this.y=Math.ceil(this.y/T)*T}
      else this.y+=this.vy;
      this.gnd=false;
    }else{
      if(this.vy>0&&this.onSolid(tm)){
        this.y=Math.floor((this.y+this.h)/T)*T-this.h;
        this.vy=0;this.gnd=true;
      }else if(this.vy===0&&!this.onSolid(tm)){
        this.gnd=false;this.vy+=GR;this.y+=this.vy;
      }else{
        this.y+=this.vy;this.gnd=false;
      }
    }
  }
  hurt(n){if(this.inv>0)return;this.hp-=n;this.inv=0.4;P.emit(this.x+this.w/2,this.y+this.h/2,8,'#f44',4,0.4,2);if(this.hp<=0){this.hp=0;this.die()}}
  die(){this.on=false;P.emit(this.x+this.w/2,this.y+this.h/2,15,'#f44',5,0.6,3)}
}

// ═══ HERO ═══
class Hero extends Ent{
  constructor(nm,x,y,col,customType){
    super(x,y,20,36);
    this.nm=nm;this.col=col;this.customType=customType;
    this.spd=2.1;this.jf=-9;this.ctrl=false;
    this.st='idle';this.atkT=0;this.atkCD=0;this.dashCD=0;this.dshT=0;
    this.atkDmg=24;this.skillCD=0;this.skillT=0;
    this.jumps=0;this.maxJumps=2;
    this.animFrame=0;this.animTimer=0;
  }
  update(dt,tm){
    if(!this.on)return;
    if(this.inv>0)this.inv-=dt;
    if(this.atkCD>0)this.atkCD-=dt;
    if(this.dashCD>0)this.dashCD-=dt;
    if(this.skillCD>0)this.skillCD-=dt;

    this.vy=Math.min(this.vy+GR,MF);

    if(this.gnd)this.jumps=0;

    if(!this.ctrl){
      this.vx=0;
      this.st='idle';
      this.animTimer+=dt;
      if(this.animTimer>=0.08){this.animTimer=0;this.animFrame=(this.animFrame+1)%4}
      this.mv(tm);
      return;
    }

    let mov=false;
    if(this.st!=='attack'&&this.st!=='skill'){
      if(I.down('ArrowLeft')||I.down('KeyA')){this.vx=-this.spd;this.rt=false;mov=true}
      else if(I.down('ArrowRight')||I.down('KeyD')){this.vx=this.spd;this.rt=true;mov=true}
      else this.vx=0;

      if((I.pr('ArrowUp')||I.pr('KeyW')||I.pr('Space'))&&this.jumps<this.maxJumps){
        this.vy=this.jf;this.gnd=false;this.jumps++;
        if(this.jumps>1)P.emit(this.x+this.w/2,this.y+this.h,6,this.col,2,0.2,1);
      }
      if((I.pr('KeyZ')||I.pr('KeyJ'))&&this.atkCD<=0){
        this.st='attack';this.atkCD=0.4;this.atkT=0.3;this.animFrame=0;this.animTimer=0;
        // Attack VFX — sprite-based effect per character
        const ax=this.rt?this.x+this.w+8:this.x-8;
        const cfg=FXConfig.heroes[this.customType];
        if(cfg)FX.play(cfg.atk,ax,this.y+this.h*0.4,40,!this.rt,0.04);
        P.emit(ax,this.y+this.h*0.3,4,this.col,2,0.2,1.5);
      }
      if((I.pr('KeyQ')||I.pr('KeyL'))&&this.skillCD<=0){
        this.st='skill';this.skillCD=3.0;this.skillT=0.5;this.animFrame=0;this.animTimer=0;
        // Skill VFX — unique sprite effect per character
        const sx=this.x+this.w/2,sy=this.y+this.h/2;
        const cfg=FXConfig.heroes[this.customType];
        if(cfg)FX.play(cfg.skill,sx,sy,56,!this.rt,0.04);
        P.emit(sx,sy,6,this.col,3,0.3,2);
      }
      if((I.pr('KeyX')||I.pr('KeyK'))&&this.dashCD<=0){
        this.dshT=0.12;this.dashCD=0.6;this.vx=(this.rt?1:-1)*7;this.inv=0.15;
        FX.play(FXConfig.dash,this.x+this.w/2,this.y+this.h/2,32,this.rt,0.03);
      }
    }
    if(this.dshT>0)this.dshT-=dt;

    if(this.st==='attack'){this.atkT-=dt;if(this.atkT<=0){this.st='idle'}}
    else if(this.st==='skill'){this.skillT-=dt;if(this.skillT<=0){this.st='idle'}}
    else if(!this.gnd&&this.vy<0){this.st='jump'}
    else if(!this.gnd){this.st='fall'}
    else if(mov){this.st='run'}
    else{this.st='idle'}

    this.animTimer+=dt;
    const frameCount={idle:4,run:6,jump:2,fall:2,attack:4,skill:6,dash:3}[this.st]||4;
    const frameSpeed={idle:0.08,run:0.08,jump:0.08,fall:0.08,attack:0.08,skill:0.08,dash:0.08}[this.st]||0.08;
    if(this.animTimer>=frameSpeed){
      this.animTimer=0;
      if(this.st==='attack'||this.st==='skill'){
        if(this.animFrame<frameCount-1)this.animFrame++;
      }else{
        this.animFrame=(this.animFrame+1)%frameCount;
      }
    }

    this.mv(tm);

    const tx=this.x+this.w/2-CW/2,ty=this.y+this.h/2-CH/2;
    R.cam.x+=(tx-R.cam.x)*0.08;R.cam.y+=(ty-R.cam.y)*0.08;
  }
  atkBox(){
    if(this.st!=='attack'&&this.st!=='skill')return null;
    const r=this.st==='skill'?50:30;const dmg=this.st==='skill'?this.atkDmg*2:this.atkDmg;
    return this.rt?{x:this.x+this.w,y:this.y-4,w:r,h:this.h+8,dmg}:{x:this.x-r,y:this.y-4,w:r,h:this.h+8,dmg};
  }
  draw(){
    if(!this.on)return;if(this.inv>0&&((this.inv*12)|0)%2)return;
    R.drawHero(this.customType,this.st,this.animFrame,this.x,this.y,this.w,this.h,!this.rt);
    if(this.ctrl)R.txt(this.nm,this.x+this.w/2-R.cam.x,this.y-8-R.cam.y,this.col,9,'center');
    if(this.ctrl&&this.skillCD>0){R.a(0.6);R.txt('Q:'+this.skillCD.toFixed(1)+'s',this.x+this.w/2-R.cam.x,this.y-18-R.cam.y,'#aaa',8,'center');R.ra()}
    if(this.ctrl&&!this.gnd&&this.jumps<this.maxJumps){R.a(0.5);R.txt('\u2191',this.x+this.w/2-R.cam.x,this.y-28-R.cam.y,'#8cf',10,'center');R.ra()}
  }
}

// ═══ COMPANION ═══
class Companion{
  constructor(hero){this.hero=hero;this.followSpeed=hero.spd*0.85}
  update(dt,active,tm){
    if(!this.hero.on||this.hero.ctrl)return;
    const dx=active.x-this.hero.x,dist=Math.abs(dx);
    if(dist>60){
      this.hero.vx=(dx>0?1:-1)*this.followSpeed;
      this.hero.rt=dx>0;
      this.hero.st='run';
    }else if(dist>25){
      this.hero.vx=(dx>0?1:-1)*this.followSpeed*0.4;
      this.hero.st='run';
    }else{
      this.hero.vx=0;
      this.hero.st='idle';
    }
    this.hero.animTimer+=dt;
    const frameSpeed=0.08;
    if(this.hero.animTimer>=frameSpeed){
      this.hero.animTimer=0;
      const frameCount=this.hero.st==='run'?6:4;
      this.hero.animFrame=(this.hero.animFrame+1)%frameCount;
    }
    this.hero.vy=Math.min(this.hero.vy+GR,MF);
    this.hero.mv(tm);
  }
}

// ═══ ENEMY (with custom drawing) ═══
class Enem extends Ent{
  constructor(x,y,w,h,nm,col,hp,dmg,ai,customType){
    super(x,y,w,h);this.nm=nm;this.col=col;this.hp=hp;this.mhp=hp;this.dmg=dmg;this.ai=ai;
    this.dir=1;this.pt=0;this.akt=0;this.spd=0.7;this.ag=130;
    this.customType=customType;this.animFrame=0;this.animTimer=0;this.st='idle';
  }
  update(dt,tm,heroes){
    if(!this.on)return;if(this.inv>0)this.inv-=dt;this.akt-=dt;
    const h=heroes.find(h=>h.ctrl&&h.on);if(!h)return;
    const d=Math.abs(this.x-h.x);
    if(this.ai==='boss'){
      this.vx=(h.x>this.x?1:-1)*this.spd*1.8;this.rt=this.vx>0;this.st='run';
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1.2;this.st='attack';
        P.emit(h.x+h.w/2,h.y+h.h/2,10,'#f66',5,0.3,3);P.emit(this.x+(this.rt?this.w:0),this.y+this.h*0.3,8,'#fa0',4,0.25,2);}
    }else if(this.ai==='patrol'){
      this.pt+=dt;if(this.pt>2.5){this.dir*=-1;this.pt=0}
      this.vx=this.spd*this.dir;this.rt=this.dir>0;
      if(d<this.ag)this.ai='chase';
      this.st='idle';
    }else if(this.ai==='chase'){
      if(d>280){this.ai='patrol';return}
      this.vx=(h.x>this.x?1:-1)*this.spd*1.4;this.rt=this.vx>0;
      this.st='run';
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1;this.st='attack';
        P.emit(h.x+h.w/2,h.y+h.h/2,8,'#f44',4,0.25,2);}
    }else if(this.ai==='static'){
      this.vx=0;this.st=d<60?'attack':'idle';
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1.2;
        P.emit(h.x+h.w/2,h.y+h.h/2,6,'#f44',3,0.2,2);}
    }

    this.vy=Math.min(this.vy+GR,MF);
    if(this.vx!==0&&!this.blockedH(tm,this.vx))this.x+=this.vx;
    else this.vx=0;
    if(this.vy>0&&this.onSolid(tm)){
      this.y=Math.floor((this.y+this.h)/T)*T-this.h;this.vy=0;this.gnd=true;
    }else{this.y+=this.vy;this.gnd=false}

    this.animTimer+=dt;
    const frameCount={idle:4,run:6,attack:4}[this.st]||4;
    if(this.animTimer>=0.1){this.animTimer=0;this.animFrame=(this.animFrame+1)%frameCount}
  }
  hurt(n){if(this.inv>0)return;this.hp-=n;this.inv=0.4;P.emit(this.x+this.w/2,this.y+this.h/2,8,'#f44',4,0.4,2);if(this.hp<=0){this.hp=0;this.on=false;FX.play(FXConfig.enemyDeath,this.x+this.w/2,this.y+this.h/2,48,false,0.04);P.emit(this.x+this.w/2,this.y+this.h/2,15,this.col,5,0.6,3)}}
  draw(){
    if(!this.on)return;if(this.inv>0&&((this.inv*12)|0)%2)return;
    const cx=this.x+this.w/2,cy=this.y+this.h;
    R.drawEnemy(this.customType,this.st,this.animFrame,cx-this.w/2,cy-this.h,this.w,this.h,!this.rt);
    if(this.hp<this.mhp){R.rect(this.x,this.y-5,this.w,3,'#333');R.rect(this.x,this.y-5,this.w*(this.hp/this.mhp),3,this.hp/this.mhp>0.5?'#4a4':'#f44')}
    R.txt(this.nm,this.x+this.w/2-R.cam.x,this.y-9-R.cam.y,'#faa',8,'center');
  }
}

// ═══ DIALOGUE ═══
const D={on:false,dlgs:[],idx:0,cb:null,_advance:false,
  show(dlgs,cb){
    this.dlgs=dlgs;this.idx=0;this.cb=cb;this.on=true;this._advance=false;
    document.getElementById('dlg').style.display='block';
    this.upd();
  },
  upd(){
    if(!this.on)return;

      if(this.cb)this.cb();
    }else{
      this.upd();
    }
  },
  up(dt){
    if(!this.on)return;
    if(I.pr('Space')||I.pr('Enter')||this._advance){
      this._advance=false;

};

  swap(idx){

    const cur=this.heroes[this.ai],nxt=this.heroes[idx];

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
    else el.textContent='';
  }

  update(dt){
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    // Act 3: NPC interaction via Z/J key
    if(this.act===3){
      if(I.pr('KeyZ')||I.pr('KeyJ')){
        const h=this.heroes[this.ai];
        this.npcs.forEach(n=>{
          if(!n.tk&&n.dlgs&&Math.abs(n.x-h.x)<50&&Math.abs(n.y-h.y)<40){
            n.tk=true;
            D.show(n.dlgs,()=>{});
          }
        });
      }
      // Auto-progress when walking right past x=900
      if(this.heroes[this.ai].x>900&&!this._act3done){
        this._act3done=true;
        D.show([d('Narrator','The truth becomes clearer with each step...')],()=>{this.bAct4()});
      }
      this.heroes[this.ai].update(dt,this.tm);
      this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm));
      P.up(dt);this.hud();
      if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
      return;
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm));
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));

    // Act 4: Guard detection (stealth failure)
    if(this.act===4&&this.tut){
      const h=this.heroes[this.ai];
      this.enemies.forEach(e=>{
        if(e.customType==='student'&&e.on){
          const dist=Math.sqrt((e.x-h.x)**2+(e.y-h.y)**2);
          if(dist<100&&!this.stealthFailed){
            this.stealthFailed=true;
            D.show([d('Guard','Intruder! Guards!')],()=>{this.bAct4()});
          }
        }
      });
    }

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    P.up(dt);
    this.hud();

    // Act 1: Defeat all enemies
    if(this.act===1&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      this._act1done=true;
      D.show([d('Narrator','Victory in the exam!')],()=>{this.bAct2()});
    }

    // Act 4: Defeat all mimics AND reach x>700
    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)&&this.heroes[this.ai].x>700){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#00aa44',6,0.8,3);
      this._act4done=true;
      D.show([d('Narrator','The library secrets are revealed!')],()=>{this.bAct5()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#0d2847');g.addColorStop(1,'#1a3a5a');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);

    if(this.tm)this.tm.draw(this.tileset);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    P.draw();
  }
}

    D.show([d('Narrator','A figure floats above the abyss...'),d('Narrator','The Spectator observes all who enter.'),d('Tutorial','Defeat it!')],()=>{this.tut=true});
  }

  bAct5(){
    this.act=5;
    const W=120,H=20;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}
    for(let x=90;x<W;x++)this.tm.set(x,H-4,3);

    this.heroes=this.createHeroes(50,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.npcs=[new NPC(900,(H-4)*T,'Becklin','npc',[d('Becklin','You made it through the library.')])];

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='Escape: Reach the exit!';
    D.show([d('Narrator','The exit corridor lies ahead.')],()=>{});
  }

  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
  }

  update(dt){
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    if(this.act===1){
      const guard=this.enemies[0];
      const hero=this.heroes[this.ai];
      const dist=Math.sqrt((hero.x-guard.x)**2+(hero.y-guard.y)**2);
      if(dist<100&&this.tut&&!this.stealthFailed){
        this.stealthFailed=true;
        D.show([d('Narrator','Detected! Restarting stealth...')],()=>{this.bAct1()});
        return;
      }
      if(hero.x>500&&this.tut&&!this._stealthDone){
        this._stealthDone=true;
        D.show([d('Narrator','Stealth successful!')],()=>{this.bAct2()});
        return;
      }
    }

    if(this.act===2&&!this._act2done){
      if(this.heroes[this.ai].y<100){
        this._act2done=true;
        D.show([d('Narrator','You have descended to the forbidden chamber.')],()=>{this.bAct3()});
        return;
      }
    }

    if(this.act===5&&!this._act5done){
      if(this.heroes[this.ai].x>800){
        this._act5done=true;
        D.show([d('Narrator','You escaped the library!')],()=>{G.sc=new Lv4();G.sc.enter()});
        return;
      }
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm));
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    this.npcs.forEach(n=>n.update(dt,this.heroes[this.ai]));

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    P.up(dt);
    this.hud();

    if(this.act===3&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#9944ff',6,0.8,3);
      D.show([d('Narrator','The curse breaks!')],()=>{this.bAct4()});
    }

    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      D.show([d('Narrator','The Spectator falls!')],()=>{this.bAct5()});
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#050510');g.addColorStop(1,'#080818');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);

    if(this.tm)this.tm.draw(this.tileset);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    P.draw();
  }
}

    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.enemies=[
      new Enem(500,(H-5)*T,24,32,'Draconian','#4a6622',70,12,'chase','draconian'),
      new Enem(650,(H-6)*T,24,32,'Draconian','#5a7722',70,12,'chase','draconian'),
    ];

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='La Ruina Roja: Draconians reinforce!';
    D.show([d('Kansaldi','La Ruina Roja - the Red Ruin has come!'),d('Kansaldi','You cannot stop us all!'),d('Tutorial','Defeat the draconians!')],()=>{this.tut=true});
  }

  bAct4(){
    this.act=4;
    const W=150,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}
    for(let x=80;x<120;x++)this.tm.set(x,H-6,3);

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.enemies=[
      new Enem(450,(H-7)*T,32,40,'Sivak Draconian','#556633',150,14,'boss','draconian'),
    ];

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='First Wave: Sivak Draconian boss!';
    D.show([d('Narrator','A towering Sivak Draconian emerges!'),d('Narrator','Its wings spread wide, blocking the sun.'),d('Tutorial','This foe is formidable!')],()=>{this.tut=true});
  }

  bAct5(){
    this.act=5;
    const W=150,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.enemies=[
      new Enem(450,(H-4)*T,28,36,'Boilerdrak','#ff6633',200,16,'boss','boilerdrak'),
    ];

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='Iron and Fire: Boilerdrak awakes!';
    D.show([d('Narrator','From the flames, the Boilerdrak emerges!'),d('Narrator','Its armor glows with terrible heat!'),d('Tutorial','Stand firm!')],()=>{this.tut=true});
  }

  bAct6(){
    this.act=6;
    const W=150,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    const ogre=new Enem(400,(H-5)*T,28,40,'Ogre','#aa8855',180,13,'boss','ogre');
    const goblin=new Enem(400,(H-5)*T,16,20,'Goblin Chief','#44cc44',80,8,'static','goblin');
    goblin.inv=999;
    this.enemies=[ogre,goblin];
    this._ogreDead=false;

    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='Last Stand: Ogre and Goblin Chief!';
    D.show([d('Narrator','A towering Ogre appears, bearing a Goblin Chief!'),d('Narrator','The final defense of the enemy forces!'),d('Tutorial','Defeat them!')],()=>{this.tut=true});
  }

  bAct7(){
    this.act=7;
    const W=150,H=18;
    this.tm=new TM(W,H);
    this.enemies=[];this.npcs=[];

    for(let x=0;x<W;x++)for(let y=H-3;y<H;y++)this.tm.set(x,y,1);
    for(let y=H-3;y<H;y++){this.tm.set(0,y,2);this.tm.set(W-1,y,2)}

    this.heroes=this.createHeroes(60,(H-4)*T);
    this.heroes[0].ctrl=true;
    this.ai=0;

    this.enemies=[
      new Enem(500,(H-5)*T,40,48,'Kansaldi','#1a0a0a',999,25,'static','kansaldi'),
    ];

    this.escapeTimer=10;
    this.rebuildCompanions();
    this.hud();
    document.getElementById('hint').textContent='Sin Esperanza: The Dragon Commander!';
    D.show([d('Narrator','The ground shakes...'),d('Narrator','Kansaldi, the Dragon Commander, emerges!'),d('Kansaldi','Your struggle ends now!'),d('Narrator','This battle cannot be won. Escape!')],()=>{this.tut=true});
  }

  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if(this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
  }

  update(dt){
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    if(this.act===1&&!this._act1done){
      if(this.heroes[this.ai].x>500){
        this._act1done=true;
        D.show([d('Narrator','The battle of High Hill begins...'),d('Narrator','But something is wrong with the actors...')],()=>{this.bAct2()});
      }
    }

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm));
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    this.npcs.forEach(n=>n.update(dt,this.heroes[this.ai]));

    // Handle ogre-goblin mechanic for act 6
    if(this.act===6&&this.enemies.length>=2){
      const ogre=this.enemies[0];
      const goblin=this.enemies[1];
      if(ogre.on&&!this._ogreDead){
        // Goblin rides on ogre
        goblin.x=ogre.x;
        goblin.y=ogre.y-ogre.h;
        goblin.inv=999;
      }else if(!ogre.on&&!this._ogreDead){
        // Ogre dies - goblin falls and becomes vulnerable
        this._ogreDead=true;
        D.show([d('Narrator','The Goblin Chief falls!')],()=>{this.tut=true});
        goblin.ai='chase';
        goblin.inv=0;
        P.emit(ogre.x+ogre.w/2,ogre.y+ogre.h/2,20,'#44cc44',6,0.8,3);
      }
    }

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    P.up(dt);
    this.hud();

    if(this.act===2&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
      D.show([d('Narrator','The soldiers fall!')],()=>{this.bAct3()});
    }

    if(this.act===3&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#00aa44',6,0.8,3);
      D.show([d('Narrator','The draconians retreat!')],()=>{this.bAct4()});
    }

    if(this.act===4&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.8;this.shi=6;P.emit(this.enemies[0].x,this.enemies[0].y,40,'#ff8833',6,0.8,3);
      D.show([d('Narrator','The Sivak falls!')],()=>{this.bAct5()});
    }

    if(this.act===5&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.8;this.shi=6;P.emit(this.enemies[0].x,this.enemies[0].y,50,'#ff4400',7,1,4);
      D.show([d('Narrator','The Boilerdrak is vanquished!')],()=>{this.bAct6()});
    }

    if(this.act===6&&this.tut&&this.enemies.every(e=>!e.on)){
      this.shk=0.6;this.shi=5;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,30,'#d4a574',6,0.8,3);
      D.show([d('Narrator','The last defenders fall!')],()=>{this.bAct7()});
    }

    if(this.act===7&&this.tut){
      this.escapeTimer-=dt;
      if(this.escapeTimer<=0){
        D.show([
          d('Narrator','Becklin cries out: "Run!"'),
          d('Narrator','Becklin stands against Kansaldi...'),
          d('Narrator','The Dragon Commander\'s fire engulfs him.'),
          d('Arturito','No! I will hold the line!'),
          d('Narrator','Arturito charges forward to buy time.'),
          d('Narrator','The heroes flee through the inferno...'),
          d('Narrator','Back to Vogler village, victorious but forever changed.'),
        ],()=>{D.show([d('Narrator','Chronicles of Azurerune: Book 1 - Complete')],()=>{G.sc=new Lv1();G.sc.enter()})});
      }
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    const g=R.x.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#2a0a0a');g.addColorStop(1,'#3a1a1a');
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);

    if(this.act>=5){
      for(let i=0;i<15;i++){
        const x=Math.random()*CW;
        const y=Math.random()*CH;
        R.x.fillStyle=`rgba(255,${100+Math.random()*100},0,${Math.random()*0.2})`;
        R.x.fillRect(x,y,20+Math.random()*40,20+Math.random()*40);
      }
    }

    if(this.tm)this.tm.draw(this.tileset);

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    P.draw();
  }
}

    I.init();
    R.init();
    const manifest=[
      {type:'image',key:'tiles_castle',path:'assets/env/castle/tiles.png'},
      {type:'image',key:'tiles_library',path:'assets/env/library/tiles.png'},

      {type:'image',key:'fx_nick_skill',path:'assets/fx/nick_skill.png'},

  start(lvl){
    document.getElementById('title').style.display='none';
    document.getElementById('c').focus();
    this.sc=lvl;
    this.sc.enter();
    I.flush(); // clear any leftover key presses from button click
    if(!this._looping){this._looping=true;this.loop()}
  },
  title(){
    this.sc=null;
    document.getElementById('title').style.display='flex';
    document.getElementById('hud').style.display='none';
    document.getElementById('dlg').style.display='none';
    document.getElementById('hint').textContent='';
    document.getElementById('ecount').textContent='';
  },
  updateTitleText(){
    document.querySelector('#title h1').textContent=Lang.t('title');
    document.querySelector('#title h2').textContent=Lang.t('subtitle');
    document.getElementById('startBtn').textContent=Lang.t('lvl1');
    document.getElementById('startBtn2').textContent=Lang.t('lvl2');
    document.getElementById('startBtn3').textContent=Lang.t('lvl3');
    document.getElementById('startBtn4').textContent=Lang.t('lvl4');
    document.getElementById('startBtn5').textContent=Lang.t('lvl5');
    document.querySelector('#dlg .pr').textContent=Lang.t('press_space');
    // Highlight active lang
    ['EN','ES','IT'].forEach(l=>{
      const el=document.getElementById('lang'+l);
      el.style.borderColor=Lang.current===l.toLowerCase()?'#fff':'#c8a84e';
    });
  },
  _looping:false,
  loop(){
    const dt=1/60;
    try{
      if(this.sc){
        this.sc.update(dt);
        FX.up(dt);
        R.cls('#000');
        this.sc.draw();
        FX.draw();
      }else{
        R.cls('#0a1628');
      }
    }catch(err){
      console.error('Game loop error:',err);
      // Even if draw crashes, keep the loop alive so dialogue still works
      if(D.on) D.up(dt);
    }
    I.flush();
    requestAnimationFrame(()=>this.loop());
  }
};

G.init();
