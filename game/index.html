<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicles of Azurerune</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#gameContainer{position:relative}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#dlg{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:88%;max-width:680px;background:rgba(8,8,30,0.95);border:2px solid #c8a84e;border-radius:6px;padding:14px 18px;color:#f0e6c0;font-size:14px;line-height:1.5;display:none;pointer-events:auto;z-index:10}
#dlg .sp{color:#c8a84e;font-weight:bold;margin-bottom:3px;font-size:12px}
#dlg .tx{min-height:36px}
#dlg .pr{color:#555;font-size:10px;margin-top:6px;text-align:right}
#title{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto;z-index:20}
#title h1{color:#c8a84e;font-size:30px;text-shadow:0 0 18px rgba(200,168,78,0.4);margin-bottom:4px;text-align:center}
#title h2{color:#8ab4d4;font-size:15px;margin-bottom:28px;font-weight:normal;text-align:center}
#title .sub{color:#5a84a4;font-size:11px;margin-bottom:20px}
.btn{pointer-events:auto;background:rgba(200,168,78,0.1);border:1px solid #c8a84e;color:#c8a84e;padding:9px 32px;font-family:inherit;font-size:13px;cursor:pointer;margin:4px;border-radius:3px;outline:none}
.btn:hover{background:rgba(200,168,78,0.22)}
.btn:focus{outline:none}
#hud{position:absolute;top:0;left:0;width:100%;padding:5px 8px;display:none;pointer-events:none;z-index:5;display:flex;gap:5px;align-items:flex-start}
.hs{display:flex;flex-direction:column;align-items:center;pointer-events:auto;cursor:pointer;padding:2px 3px;border-radius:3px;border:2px solid transparent}
.hs.act{border-color:#c8a84e;background:rgba(200,168,78,0.08)}
.hp-bar{width:32px;height:3px;background:#222;border-radius:1px;margin-top:2px}
.hp-fill{height:100%;border-radius:1px;transition:width 0.3s}
.hs .nm{color:#888;font-size:8px;margin-top:1px}
#ecount{color:#f88;font-size:10px;margin-left:10px;margin-top:6px;pointer-events:none}
#actT{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:8;pointer-events:none}
#actT .an{color:#c8a84e;font-size:12px;letter-spacing:3px;text-transform:uppercase}
#actT .at{color:#f0e6c0;font-size:24px;margin-top:3px;text-shadow:0 0 12px rgba(200,168,78,0.3)}
#hint{position:absolute;bottom:5px;right:8px;color:#3a3a3a;font-size:9px;pointer-events:none}
#loadScr{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0a1a;z-index:30}
#loadScr .lt{color:#c8a84e;font-size:14px;margin-bottom:12px}
#loadScr .bar{width:200px;height:6px;background:#1a1a2a;border:1px solid #333;border-radius:3px}
#loadScr .fill{height:100%;background:#c8a84e;border-radius:2px;width:0%;transition:width 0.2s}
#loadScr .info{color:#555;font-size:10px;margin-top:8px}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="c" tabindex="0"></canvas>
<div id="ui">
<div id="loadScr"><div class="lt">Loading Assets...</div><div class="bar"><div class="fill" id="loadBar"></div></div><div class="info" id="loadInfo"></div></div>
<div id="title" style="display:none">
<h1>Chronicles of Azurerune</h1>
<h2>El Desafio de los Heroes</h2>
<div class="sub">Session 1 — School Day</div>
<button class="btn" id="startBtn">Start Game</button>
</div>
<div id="hud"></div>
<span id="ecount"></span>
<div id="actT"><div class="an"></div><div class="at"></div></div>
<div id="dlg"><div class="sp"></div><div class="tx"></div><div class="pr">[SPACE or CLICK]</div></div>
<div id="hint"></div>
</div>
</div>
<script>
const CW=800,CH=480,T=16,GR=0.6,MF=10;

// ═══ ASSET LOADER ═══
const Assets={
  images:{},meta:{},total:0,loaded:0,
  parseMeta(txt){
    const anims={};
    for(const line of txt.split('\n')){
      const m=line.match(/^(.+?)\s*=\s*(\d+)\s+(\d+)\s+(\d+)\s+(\d+)/);
      if(!m)continue;
      const path=m[1].trim(),x=+m[2],y=+m[3],w=+m[4],h=+m[5];
      let anim=path,frame=0;
      const fm=path.match(/^(.+?)(?:\/frame(\d+)(?:\.png)?|\.png)?$/);
      if(fm){anim=fm[1];frame=fm[2]?+fm[2]:0}
      const parts=anim.split('/');
      if(parts.length>1)anim=parts.slice(1).join('/');
      if(!anims[anim])anims[anim]=[];
      anims[anim].push({x,y,w,h,frame});
    }
    for(const k in anims)anims[k].sort((a,b)=>a.frame-b.frame);
    return anims;
  },
  async load(manifest){
    this.total=manifest.length;this.loaded=0;
    const bar=document.getElementById('loadBar'),info=document.getElementById('loadInfo');
    const promises=manifest.map(item=>{
      if(item.type==='image'){
        return new Promise(res=>{
          const img=new Image();
          img.onload=()=>{this.images[item.key]=img;this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';info.textContent=item.path;res()};
          img.onerror=()=>{console.warn('Failed:',item.path);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';res()};
          img.src=item.path;
        });
      }else if(item.type==='meta'){
        return fetch(item.path).then(r=>r.text()).then(txt=>{
          this.meta[item.key]=this.parseMeta(txt);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%';info.textContent=item.path;
        }).catch(()=>{console.warn('Failed meta:',item.path);this.loaded++;bar.style.width=(this.loaded/this.total*100)+'%'});
      }
    });
    await Promise.all(promises);
  }
};

// ═══ SPRITESHEET ANIMATION (for .txt atlas sprites) ═══
class SpriteAnim{
  constructor(imgKey,metaKey,defaultAnim){
    this.imgKey=imgKey;this.metaKey=metaKey;
    this.anim=defaultAnim||'idle';this.frame=0;this.timer=0;this.speed=0.08;this.done=false;
  }
  play(anim,speed){if(this.anim===anim)return;this.anim=anim;this.frame=0;this.timer=0;this.done=false;if(speed)this.speed=speed}
  update(dt){this.timer+=dt;const f=this.getFrames();if(!f||!f.length)return;if(this.timer>=this.speed){this.timer-=this.speed;this.frame++;if(this.frame>=f.length){this.frame=f.length-1;this.done=true}}}
  updateLoop(dt){this.timer+=dt;const f=this.getFrames();if(!f||!f.length)return;if(this.timer>=this.speed){this.timer-=this.speed;this.frame=(this.frame+1)%f.length}}
  getFrames(){const m=Assets.meta[this.metaKey];return m?m[this.anim]||null:null}
  getCurrent(){const f=this.getFrames();return f&&f.length?f[Math.min(this.frame,f.length-1)]:null}
  draw(x,y,flip,scale){
    const img=Assets.images[this.imgKey],f=this.getCurrent();if(!img||!f)return;
    const sc=scale||1,dx=x-R.cam.x,dy=y-R.cam.y,dw=f.w*sc,dh=f.h*sc;
    if(flip){R.x.save();R.x.translate(dx+dw,dy);R.x.scale(-1,1);R.x.drawImage(img,f.x,f.y,f.w,f.h,0,0,dw,dh);R.x.restore()}
    else R.x.drawImage(img,f.x,f.y,f.w,f.h,dx,dy,dw,dh);
  }
}

// ═══ PIXEL CRAWLER ENEMY (horizontal strip spritesheets: idle=4f, run=6f, hit=4f, death=6f, all 64x64) ═══
class PCEnemy{
  constructor(x,y,w,h,nm,col,hp,dmg,ai,baseDir,hasHit){
    this.x=x;this.y=y;this.w=w;this.h=h;this.nm=nm;this.col=col;
    this.hp=hp;this.mhp=hp;this.dmg=dmg;this.ai=ai;
    this.vx=0;this.vy=0;this.gnd=false;this.rt=true;
    this.dir=1;this.pt=0;this.akt=0;this.spd=1.2;this.ag=150;
    this.inv=0;this.on=true;
    this.idle=Assets.images[baseDir+'_idle'];
    this.run=Assets.images[baseDir+'_run'];
    this.death=Assets.images[baseDir+'_death'];
    this.hit=hasHit!==false?Assets.images[baseDir+'_hit']:null;
    this.anim='idle';this.frame=0;this.timer=0;this.speed=0.1;
  }
  hits(o){return this.on&&this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y}
  // Simple AABB collision — only check bottom-center and bottom-left/right
  onSolid(tm){
    const bx1=Math.floor((this.x+4)/T),bx2=Math.floor((this.x+this.w-4)/T);
    const by=Math.floor((this.y+this.h)/T);
    return tm.sol(bx1,by)||tm.sol(bx2,by);
  }
  blockedH(tm,dx){
    const nx=this.x+dx;
    const tx=dx>0?Math.floor((nx+this.w-2)/T):Math.floor((nx+2)/T);
    const ty1=Math.floor((this.y+4)/T),ty2=Math.floor((this.y+this.h-2)/T);
    return tm.sol(tx,ty1)||tm.sol(tx,ty2);
  }
  update(dt,tm,heroes){
    if(!this.on)return;if(this.inv>0)this.inv-=dt;this.akt-=dt;
    const h=heroes.find(h=>h.ctrl&&h.on);if(!h)return;
    const dist=Math.abs(this.x-h.x);
    if(this.ai==='patrol'){
      this.pt+=dt;if(this.pt>2.5){this.dir*=-1;this.pt=0}
      this.vx=this.spd*this.dir;this.rt=this.dir>0;
      if(dist<this.ag)this.ai='chase';
      this.anim='idle';
    }else if(this.ai==='chase'){
      if(dist>280){this.ai='patrol';return}
      this.vx=(h.x>this.x?1:-1)*this.spd*1.4;this.rt=this.vx>0;
      this.anim='run';
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1;this.anim='hit'}
    }else if(this.ai==='static'){
      this.vx=0;this.anim=dist<60?'hit':'idle';
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1.2}
    }
    // Gravity
    this.vy=Math.min(this.vy+GR,MF);
    // Move horizontally
    if(this.vx!==0&&!this.blockedH(tm,this.vx))this.x+=this.vx;
    else this.vx=0;
    // Move vertically
    if(this.vy>0&&this.onSolid(tm)){
      this.y=Math.floor((this.y+this.h)/T)*T-this.h;this.vy=0;this.gnd=true;
    }else{this.y+=this.vy;this.gnd=false}
    // Animate
    this.timer+=dt;
    const img=this.anim==='run'?this.run:this.anim==='hit'?(this.hit||this.idle):this.idle;
    const fc=this.anim==='run'?6:4;
    if(img&&this.timer>=this.speed){this.timer-=this.speed;this.frame=(this.frame+1)%fc}
  }
  hurt(n){if(this.inv>0)return;this.hp-=n;this.inv=0.4;P.emit(this.x+this.w/2,this.y+this.h/2,8,'#f44',4,0.4,2);if(this.hp<=0){this.hp=0;this.on=false;P.emit(this.x+this.w/2,this.y+this.h/2,15,this.col,5,0.6,3)}}
  draw(){
    if(!this.on)return;if(this.inv>0&&((this.inv*12)|0)%2)return;
    const img=this.anim==='run'?this.run:this.anim==='hit'?(this.hit||this.idle):this.idle;
    if(!img)return;
    const fw=64,fh=64,sx=this.frame*fw;
    const dx=this.x+this.w/2-fw/2-R.cam.x,dy=this.y+this.h-fh-R.cam.y;
    if(this.rt)R.x.drawImage(img,sx,0,fw,fh,dx,dy,fw,fh);
    else{R.x.save();R.x.translate(dx+fw,dy);R.x.scale(-1,1);R.x.drawImage(img,sx,0,fw,fh,0,0,fw,fh);R.x.restore()}
    if(this.hp<this.mhp){R.rect(this.x,this.y-5,this.w,3,'#333');R.rect(this.x,this.y-5,this.w*(this.hp/this.mhp),3,this.hp/this.mhp>0.5?'#4a4':'#f44')}
    R.txt(this.nm,this.x+this.w/2-R.cam.x,this.y-9-R.cam.y,'#faa',8,'center');
  }
}

// ═══ EFFECT SPRITE ═══
class FXSprite{
  constructor(imgKey,fw,fh,total,speed){this.imgKey=imgKey;this.fw=fw;this.fh=fh;this.total=total;this.speed=speed||0.06;this.frame=0;this.timer=0;this.active=false;this.x=0;this.y=0;this.flip=false}
  play(x,y,flip){this.x=x;this.y=y;this.flip=flip||false;this.frame=0;this.timer=0;this.active=true}
  update(dt){if(!this.active)return;this.timer+=dt;if(this.timer>=this.speed){this.timer-=this.speed;this.frame++;if(this.frame>=this.total)this.active=false}}
  draw(){
    if(!this.active)return;const img=Assets.images[this.imgKey];if(!img)return;
    const sx=this.frame*this.fw,dx=this.x-this.fw/2-R.cam.x,dy=this.y-this.fh/2-R.cam.y;
    if(this.flip){R.x.save();R.x.translate(dx+this.fw,dy);R.x.scale(-1,1);R.x.drawImage(img,sx,0,this.fw,this.fh,0,0,this.fw,this.fh);R.x.restore()}
    else R.x.drawImage(img,sx,0,this.fw,this.fh,dx,dy,this.fw,this.fh);
  }
}

// ═══ INPUT ═══
const I={k:{},j:{},
  init(){
    addEventListener('keydown',e=>{if(!this.k[e.code])this.j[e.code]=true;this.k[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code))e.preventDefault()});
    addEventListener('keyup',e=>{this.k[e.code]=false});
    document.getElementById('dlg').addEventListener('click',e=>{this.j['Space']=true;e.stopPropagation()});
    document.getElementById('c').addEventListener('click',e=>{if(D.on)this.j['Space']=true});
  },
  flush(){this.j={}},down(c){return!!this.k[c]},pr(c){return!!this.j[c]}
};

// ═══ RENDERER ═══
const R={c:null,x:null,cam:{x:0,y:0},
  init(){this.c=document.getElementById('c');this.c.width=CW;this.c.height=CH;this.x=this.c.getContext('2d');this.x.imageSmoothingEnabled=false},
  cls(col){this.x.fillStyle=col;this.x.fillRect(0,0,CW,CH)},
  rect(x,y,w,h,col){this.x.fillStyle=col;this.x.fillRect(x-this.cam.x,y-this.cam.y,w,h)},
  sr(x,y,w,h,col){this.x.fillStyle=col;this.x.fillRect(x,y,w,h)},
  txt(t,x,y,c,s,a){this.x.fillStyle=c||'#fff';this.x.font=(s||11)+'px "Courier New",monospace';this.x.textAlign=a||'left';this.x.fillText(t,x,y)},
  a(v){this.x.globalAlpha=v},ra(){this.x.globalAlpha=1}
};

// ═══ PARTICLES ═══
const P={ps:[],
  emit(x,y,n,col,sp,lf,sz){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*sp;this.ps.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,l:lf,ml:lf,c:col,s:sz||2})}},
  up(dt){this.ps=this.ps.filter(p=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.08*dt*60;p.l-=dt;return p.l>0})},
  draw(){this.ps.forEach(p=>{R.a(Math.max(0,p.l/p.ml));R.rect(p.x,p.y,p.s,p.s,p.c)});R.ra()}
};

// ═══ TILEMAP ═══
// Tile types: 0=air, 1=floor, 2=wall, 3=platform, 4=deco_gold, 5=bookshelf
class TM{
  constructor(w,h){this.w=w;this.h=h;this.d=new Uint8Array(w*h)}
  set(x,y,v){if(x>=0&&x<this.w&&y>=0&&y<this.h)this.d[y*this.w+x]=v}
  get(x,y){if(x<0||x>=this.w||y<0||y>=this.h)return 1;return this.d[y*this.w+x]}
  sol(x,y){const v=this.get(x,y);return v>=1&&v<=5}

  draw(tilesetKey){
    const timg=Assets.images[tilesetKey];
    const sx=Math.max(0,(R.cam.x/T)|0),sy=Math.max(0,(R.cam.y/T)|0);
    const ex=Math.min(this.w,sx+((CW/T)|0)+2),ey=Math.min(this.h,sy+((CH/T)|0)+2);

    for(let y=sy;y<ey;y++)for(let x=sx;x<ex;x++){
      const v=this.get(x,y);
      const dx=x*T-R.cam.x,dy=y*T-R.cam.y;

      if(timg){
        if(v===0){
          // AIR: draw darkened background wall from tileset
          // Castle tileset: top-left 128x32 area has solid stone wall tiles (rows 0-1, cols 0-7)
          // Library tileset: top-left 80x48 area has dark wood tiles
          const tx=((x*7+y*3)%6)*T, ty=((x*3+y*7)%2)*T;
          R.x.drawImage(timg,tx,ty,T,T,dx,dy,T,T);
          R.x.fillStyle='rgba(0,0,10,0.55)';R.x.fillRect(dx,dy,T,T);
        }else if(v===1){
          // FLOOR: bright stone/wood from row 0
          const tx=((x*5+y*11)%8)*T;
          R.x.drawImage(timg,tx,0,T,T,dx,dy,T,T);
        }else if(v===2){
          // WALL: darker variant from row 1
          const tx=((x*3+y*7)%8)*T;
          R.x.drawImage(timg,tx,T,T,T,dx,dy,T,T);
        }else if(v===3){
          // PLATFORM: slightly different row
          const tx=((x*11+y*5)%6)*T;
          R.x.drawImage(timg,tx,T*2,T,T,dx,dy,T,T);
        }else if(v===4){
          // GOLD DECO
          R.x.drawImage(timg,0,T*4,T,T,dx,dy,T,T);
        }else if(v===5){
          // BOOKSHELF
          const tx=((x*3+y)%4)*T;
          R.x.drawImage(timg,tx,T*3,T,T,dx,dy,T,T);
        }
      }else{
        // Fallback colors
        const cols={0:'#1a1a2a',1:'#4a4a6a',2:'#3a3a5a',3:'#5a4a3a',4:'#c8a84e',5:'#6a4a3a'};
        R.x.fillStyle=cols[v]||'#222';R.x.fillRect(dx,dy,T,T);
      }
    }
  }
}

// ═══ ENTITY BASE ═══
class Ent{
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;this.gnd=false;this.rt=true;this.hp=100;this.mhp=100;this.on=true;this.inv=0}
  hits(o){return this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y}

  // Simplified collision: check if feet are on solid ground
  onSolid(tm){
    const bx1=Math.floor((this.x+4)/T),bx2=Math.floor((this.x+this.w-4)/T);
    const by=Math.floor((this.y+this.h)/T);
    return tm.sol(bx1,by)||tm.sol(bx2,by);
  }
  // Check horizontal blocking
  blockedH(tm,dx){
    const nx=this.x+dx;
    const tx=dx>0?Math.floor((nx+this.w-2)/T):Math.floor((nx+2)/T);
    const ty1=Math.floor((this.y+6)/T),ty2=Math.floor((this.y+this.h-2)/T);
    return tm.sol(tx,ty1)||tm.sol(tx,ty2);
  }
  // Check ceiling
  blockedUp(tm){
    const tx1=Math.floor((this.x+4)/T),tx2=Math.floor((this.x+this.w-4)/T);
    const ty=Math.floor((this.y-1)/T);
    return tm.sol(tx1,ty)||tm.sol(tx2,ty);
  }

  mv(tm){
    // Horizontal: simple - move if not blocked
    if(this.vx!==0){
      if(!this.blockedH(tm,this.vx))this.x+=this.vx;
      else{
        // Snap to tile edge
        if(this.vx>0)this.x=Math.floor((this.x+this.w-2)/T)*T-(this.w-2);
        else this.x=Math.ceil((this.x+2)/T)*T-2;
        this.vx=0;
      }
    }
    // Vertical
    if(this.vy<0){
      // Moving up
      if(this.blockedUp(tm)){this.vy=0;this.y=Math.ceil(this.y/T)*T}
      else this.y+=this.vy;
      this.gnd=false;
    }else{
      // Moving down or stationary
      if(this.vy>0&&this.onSolid(tm)){
        // Land on surface: snap to top of tile
        this.y=Math.floor((this.y+this.h)/T)*T-this.h;
        this.vy=0;this.gnd=true;
      }else if(this.vy===0&&!this.onSolid(tm)){
        // Walked off edge
        this.gnd=false;this.vy+=GR;this.y+=this.vy;
      }else{
        this.y+=this.vy;this.gnd=false;
      }
    }
  }
  hurt(n){if(this.inv>0)return;this.hp-=n;this.inv=0.4;P.emit(this.x+this.w/2,this.y+this.h/2,8,'#f44',4,0.4,2);if(this.hp<=0){this.hp=0;this.die()}}
  die(){this.on=false;P.emit(this.x+this.w/2,this.y+this.h/2,15,'#f44',5,0.6,3)}
}

// ═══ HERO (with DOUBLE JUMP) ═══
class Hero extends Ent{
  constructor(nm,x,y,col,imgKey,metaKey,type,skillFX,atkFX){
    const cw=type==='knight'?26:16;
    const ch=type==='knight'?38:28;
    super(x,y,cw,ch);
    this.nm=nm;this.col=col;this.type=type;
    this.spd=3.0;this.jf=-9;this.ctrl=false;
    this.st='idle';this.atkT=0;this.atkCD=0;this.dashCD=0;this.dshT=0;
    this.atkDmg=24;this.skillCD=0;this.skillT=0;
    // DOUBLE JUMP
    this.jumps=0;this.maxJumps=2;
    // Animation
    this.sprite=new SpriteAnim(imgKey,metaKey,type==='knight'?'idle':'idle_A');
    this.sprite.speed=0.08;
    this.skillFX=skillFX;this.atkFX=atkFX;
    this.fw=type==='knight'?112:40;
    this.fh=type==='knight'?80:40;
  }
  update(dt,tm){
    if(!this.on)return;
    if(this.inv>0)this.inv-=dt;
    if(this.atkCD>0)this.atkCD-=dt;
    if(this.dashCD>0)this.dashCD-=dt;
    if(this.skillCD>0)this.skillCD-=dt;

    // Gravity
    this.vy=Math.min(this.vy+GR,MF);

    // Reset jumps on ground
    if(this.gnd)this.jumps=0;

    if(!this.ctrl){
      this.vx=0;
      this.sprite.play(this.type==='knight'?'idle':'idle_A');
      this.sprite.updateLoop(dt);
      this.mv(tm);
      return;
    }

    let mov=false;
    if(this.st!=='attack'&&this.st!=='skill'){
      if(I.down('ArrowLeft')||I.down('KeyA')){this.vx=-this.spd;this.rt=false;mov=true}
      else if(I.down('ArrowRight')||I.down('KeyD')){this.vx=this.spd;this.rt=true;mov=true}
      else this.vx=0;

      // DOUBLE JUMP: can jump up to maxJumps times
      if((I.pr('ArrowUp')||I.pr('KeyW')||I.pr('Space'))&&this.jumps<this.maxJumps){
        this.vy=this.jf;this.gnd=false;this.jumps++;
        if(this.jumps>1)P.emit(this.x+this.w/2,this.y+this.h,6,this.col,2,0.2,1); // double jump particles
      }
      if((I.pr('KeyZ')||I.pr('KeyJ'))&&this.atkCD<=0){
        this.st='attack';this.atkCD=0.4;this.atkT=0.3;
        this.sprite.play(this.type==='knight'?'attack_A':'punch_A');this.sprite.speed=0.04;
        if(this.atkFX){const fx_x=this.rt?this.x+this.w+16:this.x-16;this.atkFX.play(fx_x,this.y+this.h/2,!this.rt)}
      }
      if((I.pr('KeyQ')||I.pr('KeyL'))&&this.skillCD<=0){
        this.st='skill';this.skillCD=3.0;this.skillT=0.5;
        this.sprite.play(this.type==='knight'?'attack_C':'dash_attack');this.sprite.speed=0.04;
        if(this.skillFX){const fx_x=this.rt?this.x+this.w+24:this.x-24;this.skillFX.play(fx_x,this.y+this.h/2-10,!this.rt)}
      }
      if((I.pr('KeyX')||I.pr('KeyK'))&&this.dashCD<=0){
        this.dshT=0.12;this.dashCD=0.6;this.vx=(this.rt?1:-1)*10;this.inv=0.15;
        P.emit(this.x+this.w/2,this.y+this.h/2,5,this.col,2,0.2,2);
        this.sprite.play(this.type==='knight'?'dash_loop':'dash_attack');this.sprite.speed=0.04;
      }
    }
    if(this.dshT>0)this.dshT-=dt;

    if(this.st==='attack'){this.atkT-=dt;if(this.atkT<=0){this.st='idle';this.sprite.speed=0.08}}
    else if(this.st==='skill'){this.skillT-=dt;if(this.skillT<=0){this.st='idle';this.sprite.speed=0.08}}
    else if(!this.gnd&&this.vy<0){this.st='jump';this.sprite.play(this.type==='knight'?'jump_loop':'jump')}
    else if(!this.gnd){this.st='fall';this.sprite.play('fall')}
    else if(mov){this.st='run';this.sprite.play('run')}
    else{this.st='idle';this.sprite.play(this.type==='knight'?'idle':'idle_A')}

    if(this.st==='attack'||this.st==='skill')this.sprite.update(dt);
    else this.sprite.updateLoop(dt);

    this.mv(tm);

    // Camera
    const tx=this.x+this.w/2-CW/2,ty=this.y+this.h/2-CH/2;
    R.cam.x+=(tx-R.cam.x)*0.08;R.cam.y+=(ty-R.cam.y)*0.08;
  }
  atkBox(){
    if(this.st!=='attack'&&this.st!=='skill')return null;
    const r=this.st==='skill'?50:30;const dmg=this.st==='skill'?this.atkDmg*2:this.atkDmg;
    return this.rt?{x:this.x+this.w,y:this.y-4,w:r,h:this.h+8,dmg}:{x:this.x-r,y:this.y-4,w:r,h:this.h+8,dmg};
  }
  draw(){
    if(!this.on)return;if(this.inv>0&&((this.inv*12)|0)%2)return;
    const drawX=this.x+this.w/2-this.fw/2,drawY=this.y+this.h-this.fh;
    this.sprite.draw(drawX,drawY,!this.rt);
    if(this.ctrl)R.txt(this.nm,this.x+this.w/2-R.cam.x,this.y-8-R.cam.y,this.col,9,'center');
    if(this.ctrl&&this.skillCD>0){R.a(0.6);R.txt('Q:'+this.skillCD.toFixed(1)+'s',this.x+this.w/2-R.cam.x,this.y-18-R.cam.y,'#aaa',8,'center');R.ra()}
    // Double jump indicator
    if(this.ctrl&&!this.gnd&&this.jumps<this.maxJumps){R.a(0.5);R.txt('\u2191',this.x+this.w/2-R.cam.x,this.y-28-R.cam.y,'#8cf',10,'center');R.ra()}
  }
}

// ═══ COMPANION ═══
class Companion{
  constructor(hero){this.hero=hero;this.followSpeed=hero.spd*0.85}
  update(dt,active,tm){
    if(!this.hero.on||this.hero.ctrl)return;
    const dx=active.x-this.hero.x,dist=Math.abs(dx);
    if(dist>60){
      this.hero.vx=(dx>0?1:-1)*this.followSpeed;
      this.hero.rt=dx>0;
      this.hero.sprite.play('run');
    }else if(dist>25){
      this.hero.vx=(dx>0?1:-1)*this.followSpeed*0.4;
      this.hero.sprite.play('run');
    }else{
      this.hero.vx=0;
      this.hero.sprite.play(this.hero.type==='knight'?'idle':'idle_A');
    }
    this.hero.sprite.updateLoop(dt);
    this.hero.vy=Math.min(this.hero.vy+GR,MF);
    this.hero.mv(tm);
  }
}

// ═══ ENEMY (SpriteAnim: evil_eye, mimic, bakaris) ═══
class Enem extends Ent{
  constructor(x,y,w,h,nm,col,hp,dmg,ai,imgKey,metaKey,animType){
    super(x,y,w,h);this.nm=nm;this.col=col;this.hp=hp;this.mhp=hp;this.dmg=dmg;this.ai=ai;
    this.dir=1;this.pt=0;this.akt=0;this.spd=1;this.ag=130;
    this.animType=animType||'classic';
    if(imgKey&&metaKey){this.sprite=new SpriteAnim(imgKey,metaKey,'idle');this.sprite.speed=0.08}
    this.fw=w;this.fh=h;
    if(animType==='evil_eye'){this.fw=96;this.fh=96}
    else if(animType==='mimic'){this.fw=72;this.fh=48}
  }
  update(dt,tm,heroes){
    if(!this.on)return;if(this.inv>0)this.inv-=dt;this.akt-=dt;
    const h=heroes.find(h=>h.ctrl&&h.on);if(!h)return;
    const d=Math.abs(this.x-h.x);
    if(this.ai==='boss'){
      this.rt=h.x>this.x;
      if(d<160){this.vx=(h.x>this.x?1:-1)*this.spd*0.9;if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=0.9}}else this.vx=0;
    }else if(this.ai==='static'){
      this.vx=0;
      if(this.sprite){if(d<60)this.sprite.play(this.animType==='mimic'?'attack_A':'attack');else this.sprite.play('idle')}
      if(this.hits(h)&&this.akt<=0){h.hurt(this.dmg);this.akt=1.2}
    }
    this.vy=Math.min(this.vy+GR,MF);this.mv(tm);
    if(this.sprite)this.sprite.updateLoop(dt);
  }
  draw(){
    if(!this.on)return;if(this.inv>0&&((this.inv*12)|0)%2)return;
    if(this.sprite){this.sprite.draw(this.x+this.w/2-this.fw/2,this.y+this.h-this.fh,!this.rt)}
    else R.rect(this.x,this.y,this.w,this.h,this.col);
    if(this.hp<this.mhp){R.rect(this.x,this.y-5,this.w,3,'#333');R.rect(this.x,this.y-5,this.w*(this.hp/this.mhp),3,this.hp/this.mhp>0.5?'#4a4':'#f44')}
    R.txt(this.nm,this.x+this.w/2-R.cam.x,this.y-9-R.cam.y,'#faa',8,'center');
  }
}

// ═══ NPC ═══
class NPC{
  constructor(x,y,nm,imgKey,metaKey,type,dlgs){
    this.x=x;this.y=y;this.w=type==='knight'?26:16;this.h=type==='knight'?38:28;
    this.nm=nm;this.dlgs=dlgs;this.tk=false;this.b=Math.random()*6;this.type=type;
    this.fw=type==='knight'?112:40;this.fh=type==='knight'?80:40;

    const by=this.y+Math.sin(this.b)*1.5;
    if(this.sprite)this.sprite.draw(this.x+this.w/2-this.fw/2,by+this.h-this.fh,false);
    else R.rect(this.x,by,this.w,this.h,'#888');
    R.txt(this.nm,this.x+this.w/2-R.cam.x,by-8-R.cam.y,'#bbb',8,'center');
    if(!this.tk)R.txt('!',this.x+this.w/2-R.cam.x,by-18-R.cam.y,'#c8a84e',12,'center');
  }
}

// ═══ DIALOGUE ═══
const D={q:[],c:null,ci:0,ct:0,on:false,cb:null,
  show(a,cb){this.q=[...a];this.cb=cb;this.nxt()},
  nxt(){if(!this.q.length){this.on=false;document.getElementById('dlg').style.display='none';if(this.cb)this.cb();return}
    this.c=this.q.shift();this.ci=0;this.ct=0;this.on=true;
    const b=document.getElementById('dlg');b.style.display='block';b.querySelector('.sp').textContent=this.c.s||'';b.querySelector('.tx').textContent=''},
  up(dt){if(!this.on||!this.c)return;this.ct+=dt;
    if(this.ct>=0.022){this.ct=0;if(this.ci<this.c.t.length){this.ci++;document.querySelector('#dlg .tx').textContent=this.c.t.substring(0,this.ci)}}
    if(I.pr('Space')||I.pr('Enter')){if(this.ci<this.c.t.length){this.ci=this.c.t.length;document.querySelector('#dlg .tx').textContent=this.c.t}else this.nxt()}}
};

    this.enemies=[
      new Enem(120,(H-8)*T,30,24,'Mimic','#6a4a2a',40,12,'static','mimic_img','mimic_meta','mimic'),
      new Enem(450,(H-9)*T,30,24,'Mimic','#6a4a2a',40,12,'static','mimic_img','mimic_meta','mimic'),
      new PCEnemy(250,(H-4)*T,20,32,'Director','#7a5a3a',35,7,'patrol','lib_director',true),
      new PCEnemy(500,(H-4)*T,20,32,'Researcher','#5a7a7a',35,7,'chase','lib_researcher',true),
      new PCEnemy(350,(H-4)*T,20,32,'Censor','#8a4a4a',35,7,'chase','lib_censor',true),
    ];
    // Scroll on the top-right platform
    this.scrl={x:66*T,y:(H-15)*T,got:false};
    this.rebuildCompanions();
  }

  swap(idx){
    if(idx===this.ai||!this.heroes[idx]||!this.heroes[idx].on)return;
    const cur=this.heroes[this.ai],nxt=this.heroes[idx];
    const tx=nxt.x,ty=nxt.y;
    nxt.x=cur.x;nxt.y=cur.y;nxt.vx=0;nxt.vy=0;nxt.gnd=cur.gnd;
    cur.x=tx;cur.y=ty;cur.vx=0;cur.vy=0;
    cur.ctrl=false;cur.st='idle';nxt.ctrl=true;
    this.ai=idx;
    this.rebuildCompanions();
    P.emit(nxt.x+nxt.w/2,nxt.y+nxt.h/2,8,nxt.col,3,0.3,2);
    this.hud();
  }

  hud(){
    let h='';
    this.heroes.forEach((hero,i)=>{
      const a=i===this.ai?'act':'';const pct=Math.max(0,hero.hp/hero.mhp*100);
      const col=pct>50?'#4a4':pct>25?'#aa4':'#a44';
      h+=`<div class="hs ${a}" onclick="G.sc.swap(${i})"><div style="width:28px;height:28px;background:${hero.col}33;border-radius:2px;display:flex;align-items:center;justify-content:center"><span style="color:${hero.col};font-size:13px;font-weight:bold">${hero.nm[0]}</span></div><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${col}"></div></div><div class="nm">${hero.nm}</div></div>`;
    });
    document.getElementById('hud').innerHTML=h;
    const al=this.enemies.filter(e=>e.on).length;
    const el=document.getElementById('ecount');
    if((this.act===1||this.act===4)&&this.enemies.length)el.textContent=`Enemies: ${al}/${this.enemies.length}`;
    else el.textContent='';
  }

  update(dt){
    if(D.on){D.up(dt);return}
    if(this.shk>0){this.shk-=dt;R.cam.x+=(Math.random()-0.5)*this.shi;R.cam.y+=(Math.random()-0.5)*this.shi}
    if(!this.tm){P.up(dt);return}

    if(I.pr('Tab')){
      let n=(this.ai+1)%this.heroes.length,c=0;
      while((!this.heroes[n]||!this.heroes[n].on)&&c<this.heroes.length){n=(n+1)%this.heroes.length;c++}
      this.swap(n);
    }
    for(let i=0;i<this.heroes.length;i++)if(I.pr('Digit'+(i+1)))this.swap(i);

    this.heroes[this.ai].update(dt,this.tm);
    this.companions.forEach(comp=>comp.update(dt,this.heroes[this.ai],this.tm));
    this.enemies.forEach(e=>e.update(dt,this.tm,this.heroes));
    FXPool.forEach(fx=>fx.update(dt));

    this.heroes.forEach(hero=>{
      const ab=hero.atkBox();if(!ab)return;
      this.enemies.forEach(e=>{if(e.on&&e.x<ab.x+ab.w&&e.x+e.w>ab.x&&e.y<ab.y+ab.h&&e.y+e.h>ab.y)e.hurt(ab.dmg||hero.atkDmg)});
    });

    this.npcs.forEach(npc=>{
      npc.up(dt);
      const h=this.heroes[this.ai];
      if(h&&(I.pr('Space')||I.pr('Enter'))&&!D.on&&!npc.tk){
        if(Math.abs(h.x-npc.x)+Math.abs(h.y-npc.y)<50){npc.tk=true;D.show(npc.dlgs)}
      }
    });

    P.up(dt);

    if(this.fox&&this.fox.alive&&this.act<=2){
      const n=this.heroes.find(h=>h.nm==='Nesta');
      if(n){this.fox.b+=dt*3;this.fox.x+=(n.x-20-this.fox.x)*0.05;this.fox.y+=(n.y+8-this.fox.y)*0.05}
    }

    // === TRANSITIONS ===
    if(this.act===1&&this.tut){
      this.hud();
      if(this.enemies.every(e=>!e.on)){
        this.shk=0.5;this.shi=4;P.emit(CW/2+R.cam.x,CH/2+R.cam.y,25,'#c8a84e',6,0.8,3);
        this.act=2;
        this.showAct('Act 2','BLOOD AND GRUDGE',()=>{
          if(this.fox)this.fox.alive=false;
          D.show([
            d('Narrator','Victory! But at a terrible cost...'),
            d('Narrator','Bakaris kills Nesta\'s black fox familiar in an act of spite.'),
            d('Nesta','"NO! You will PAY for this, Bakaris!"'),
            d('Narrator','Nesta scars Bakaris\'s face permanently. A lifelong enemy is forged.'),
            d('Bakaris','"You will regret this, Saudothien."'),
          ],()=>{this.showAct('Act 3','HALLWAY RUMORS',()=>{
            this.bAct3();
            D.show([d('Narrator','Explore the corridors. Talk to fellow students (!) before the EXIT.'),d('Tutorial','Walk near NPCs and press SPACE. Talk to 3+, then find EXIT on the right.')]);
          })});
        });
      }
    }

    if(this.act===3&&this.exit){
      const h=this.heroes[this.ai];
      if(h&&Math.abs(h.x-this.exit.x)<40&&Math.abs(h.y-this.exit.y)<40){
        const tk=this.npcs.filter(n=>n.tk).length;
        if(tk>=3){
          this.exit=null;
          this.showAct('Act 4','NIGHT INFILTRATION',()=>{
            this.bAct4();
            D.show([
              d('Narrator','Under cover of night, you infiltrate the Restricted Section of the Library.'),
              d('Kote','"Watch for Mimic Books! Use DOUBLE JUMP to reach the golden scroll!"'),
              d('Tutorial','Jump across platforms (DOUBLE JUMP with SPACE x2). Reach the SCROLL at the top-right!')
            ]);
          });
        }
        else if(I.pr('Space'))D.show([d('Tutorial','Talk to more students! ('+tk+'/3)')]);
      }
    }

    if(this.act===4&&this.scrl&&!this.scrl.got){
      this.hud();
      const h=this.heroes[this.ai];
      if(h&&Math.abs(h.x-this.scrl.x)<30&&Math.abs(h.y-this.scrl.y)<40){
        this.scrl.got=true;P.emit(this.scrl.x+8,this.scrl.y+8,20,'#c8a84e',5,1,3);
        this.showAct('Act 5','DIVERGING PATHS',()=>{
          D.show([
            d('Narrator','You found it! Clues to the "Lost Library of Istar"!'),
            d('Elber','"The technology of the floating cities... it\'s all connected."'),
            d('Ispin Greenshield','"Come to Vogler. The Kingfisher Festival awaits."'),
            d('Narrator','The heroes leave Azurerune. Next stop: Vogler.'),
            d('','\u2014 LEVEL 1 COMPLETE \u2014\n\n"School Day at Azurerune"\n\nLevel 2: The Kingfisher Festival \u2014 Coming Soon!'),
          ],()=>G.title());
        });
      }
    }

    if(this.tm){R.cam.x=Math.max(0,Math.min(this.tm.w*T-CW,R.cam.x));R.cam.y=Math.max(0,Math.min(this.tm.h*T-CH,R.cam.y))}
  }

  draw(){
    // BG gradient
    const g=R.x.createLinearGradient(0,0,0,CH);
    if(this.act===4){g.addColorStop(0,'#050510');g.addColorStop(1,'#080818')}
    else{g.addColorStop(0,'#0d2847');g.addColorStop(1,'#1a3a5a')}
    R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);

    // Draw tilemap with actual tileset
    if(this.tm)this.tm.draw(this.tileset);

    // Exit door
    if(this.exit){
      R.rect(this.exit.x,this.exit.y,this.exit.w,this.exit.h,'#5a4a3a');
      R.rect(this.exit.x+4,this.exit.y+4,20,28,'#3a2a1a');
      R.rect(this.exit.x+20,this.exit.y+16,3,3,'#c8a84e');
      const t=Date.now()/600;R.a(0.5+Math.sin(t)*0.3);
      R.txt('EXIT \u25B6',this.exit.x+14-R.cam.x,this.exit.y-6-R.cam.y,'#c8a84e',9,'center');R.ra();
    }

    // Scroll
    if(this.act===4&&this.scrl&&!this.scrl.got){
      const t=Date.now()/400;R.a(0.6+Math.sin(t)*0.3);
      const sx=this.scrl.x-R.cam.x,sy=this.scrl.y-R.cam.y;
      R.x.fillStyle='#c8a84e';R.x.fillRect(sx-6,sy-4,20,16);
      R.x.fillStyle='#fff8e0';R.x.fillRect(sx-4,sy-2,16,12);
      R.ra();
      R.txt('SCROLL',this.scrl.x+4-R.cam.x,this.scrl.y-12-R.cam.y,'#c8a84e',8,'center');
    }

    // Fox
    if(this.fox&&this.fox.alive){
      const fy=this.fox.y+Math.sin(this.fox.b)*1,fx=this.fox.x-R.cam.x,fdy=fy-R.cam.y;
      R.x.fillStyle='#1a1a1a';
      R.x.fillRect(fx,fdy,10,6);R.x.fillRect(fx+2,fdy-3,6,3);
      R.x.fillRect(fx-1,fdy-5,2,3);R.x.fillRect(fx+9,fdy-5,2,3);
    }

    this.npcs.forEach(n=>n.draw());
    this.enemies.forEach(e=>e.draw());
    this.heroes.filter(h=>!h.ctrl).forEach(h=>h.draw());
    this.heroes.filter(h=>h.ctrl).forEach(h=>h.draw());
    FXPool.forEach(fx=>fx.draw());
    P.draw();
  }
}

// ═══ GAME ═══
const G={sc:null,lt:0,
  async init(){
    R.init();I.init();
    await Assets.load([
      // Heroes
      {type:'image',key:'kote',path:'assets/chars/kote.png'},
      {type:'meta',key:'kote_meta',path:'assets/chars/kote.txt'},
      {type:'image',key:'minerva',path:'assets/chars/minerva.png'},
      {type:'meta',key:'minerva_meta',path:'assets/chars/minerva.txt'},

      {type:'meta',key:'elber_meta',path:'assets/chars/elber.txt'},

      {type:'image',key:'castle_archer_run',path:'assets/enemies/castle_archer/run.png'},
      {type:'image',key:'castle_archer_death',path:'assets/enemies/castle_archer/death.png'},
      {type:'image',key:'castle_archer_hit',path:'assets/enemies/castle_archer/hit.png'},

      {type:'image',key:'hideout_scout_hit',path:'assets/enemies/hideout_scout/hit.png'},

      {type:'image',key:'skeleton_run',path:'assets/enemies/skeleton/run.png'},

      // Library enemies
      {type:'image',key:'lib_cataloguer_idle',path:'assets/enemies/lib_cataloguer/idle.png'},
      {type:'image',key:'lib_cataloguer_run',path:'assets/enemies/lib_cataloguer/run.png'},
      {type:'image',key:'lib_cataloguer_death',path:'assets/enemies/lib_cataloguer/death.png'},
      {type:'image',key:'lib_cataloguer_hit',path:'assets/enemies/lib_cataloguer/hit.png'},
      {type:'image',key:'lib_censor_idle',path:'assets/enemies/lib_censor/idle.png'},
      {type:'image',key:'lib_censor_run',path:'assets/enemies/lib_censor/run.png'},
      {type:'image',key:'lib_censor_death',path:'assets/enemies/lib_censor/death.png'},
      {type:'image',key:'lib_censor_hit',path:'assets/enemies/lib_censor/hit.png'},
      {type:'image',key:'lib_director_idle',path:'assets/enemies/lib_director/idle.png'},
      {type:'image',key:'lib_director_run',path:'assets/enemies/lib_director/run.png'},
      {type:'image',key:'lib_director_death',path:'assets/enemies/lib_director/death.png'},
      {type:'image',key:'lib_director_hit',path:'assets/enemies/lib_director/hit.png'},
      {type:'image',key:'lib_researcher_idle',path:'assets/enemies/lib_researcher/idle.png'},
      {type:'image',key:'lib_researcher_run',path:'assets/enemies/lib_researcher/run.png'},
      {type:'image',key:'lib_researcher_death',path:'assets/enemies/lib_researcher/death.png'},
      {type:'image',key:'lib_researcher_hit',path:'assets/enemies/lib_researcher/hit.png'},
      // Special enemies
      {type:'image',key:'mimic_img',path:'assets/enemies/mimic.png'},
      {type:'meta',key:'mimic_meta',path:'assets/enemies/mimic.txt'},
      // FX
      {type:'image',key:'kote_skill',path:'assets/fx/kote_skill.png'},
      {type:'image',key:'kote_atk',path:'assets/fx/kote_atk.png'},
      {type:'image',key:'minerva_skill',path:'assets/fx/minerva_skill.png'},
      {type:'image',key:'minerva_atk',path:'assets/fx/minerva_atk.png'},
      {type:'image',key:'elber_skill',path:'assets/fx/elber_skill.png'},
      {type:'image',key:'elber_atk',path:'assets/fx/elber_atk.png'},
      {type:'image',key:'nesta_skill',path:'assets/fx/nesta_skill.png'},
      {type:'image',key:'nesta_atk',path:'assets/fx/nesta_atk.png'},
      // Tilesets
      {type:'image',key:'tiles_castle',path:'assets/env/castle/tiles.png'},
      {type:'image',key:'tiles_library',path:'assets/env/library/tiles.png'},
    ]);
    document.getElementById('loadScr').style.display='none';
    document.getElementById('title').style.display='flex';
    document.getElementById('startBtn').addEventListener('click',()=>this.start());
    this.loop(performance.now());
  },
  start(){
    document.activeElement.blur();document.getElementById('c').focus();
    document.getElementById('title').style.display='none';
    this.sc=new Lv1();this.sc.enter();
  },
  title(){this.sc=null;document.getElementById('title').style.display='flex';document.getElementById('hud').style.display='none';document.getElementById('dlg').style.display='none';document.getElementById('hint').textContent='';document.getElementById('ecount').textContent=''},
  loop(ts){
    const dt=Math.min((ts-this.lt)/1000,0.05);this.lt=ts;
    if(this.sc){this.sc.update(dt);this.sc.draw()}
    else{
      const g=R.x.createLinearGradient(0,0,0,CH);g.addColorStop(0,'#0a1628');g.addColorStop(0.5,'#0d2847');g.addColorStop(1,'#1a4a6e');
      R.x.fillStyle=g;R.x.fillRect(0,0,CW,CH);
      const t=Date.now()/1000;R.a(0.06);
      for(let i=0;i<15;i++){const bx=(Math.sin(t*0.2+i*1.3)*0.5+0.5)*CW,by=CH-((t*10+i*35)%CH);R.x.fillStyle='#6a9ab8';R.x.beginPath();R.x.arc(bx,by,2+Math.sin(t*0.5+i),0,Math.PI*2);R.x.fill()}
      R.ra();
    }
    I.flush();requestAnimationFrame(t=>this.loop(t));
  }
};
G.init();
